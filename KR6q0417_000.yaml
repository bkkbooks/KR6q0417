front:
  text: 博山語録集要序佛祖之道如金剛王寶劍得之不易用之不易付之亦不易以其皆不易也故傳持斯道者實鮮其人而魚目混珠山雞冒鳳者嘗半天下也我曹洞一宗盛於唐哀於宋至元似復盛而實衰其故蓋難言之也自元朝初雪庭裕公奉詔住少林天下學者翕然宗之歷傳至萬曆改元小山書遷化詔幻休潤補其席四方之腰包而至者如鳥投林如魚赴壑而潤公乃講習評唱為事大失衆望時有蘊空忠和尚先事小山老人有年受其密印歸隱旴江之廩山天下不得而物色之壽昌先師從其剃落後蒙記莂始為弘揚既得博山來公繼之其道遂大行於世師苦參日久備嘗險阻故其言功夫為獨詳其慧光渾圓辨才無礙波瀾浩蕩莫窺涯際故學者多望洋而退其門庭緊密金鋀立辨高提祖印不妄許可故假雞聲韻者不得冒渡關津而惑亂群聽也余因先師遷化後曾相依三載雖無所得於師然三載之中未見其一語滲入情識但勉以向上事則師之有造於余也大矣及余隱荷山師自石鼓歸道經建州晤於光孝寺師曰壽昌塔掃也未余曰掃即不廢秪是不許人知師曰恁麼則偷掃去也余曰賢秪如此和尚又作麼生師曰掃即不廢秪是不曾動著余曰和尚卻似不曾掃乃一笑而別及師滅其語録浩繁連編纍牘流通為難故遐方僻壤聞師之名向師之化而語録實未嘗觸於目者有之余自壬午秋歸錫石鼓乃因渾朴上人之請僭於全録中擇其精要類而合之視全録僅十之三然簡而易行約而易致使天下學者即是窮之可以見其大全使知博山之道其廣大深密有如此非癡守一橛者可恍惚其萬一也嗚呼廣陵散不復作矣今幸其譜猶存安得於涼風白月中再聞斯曲乎時崇禎癸未春正月燈節日住福州鼓山湧泉禪寺傳曹洞正宗沙門元賢題於所居之嚬呻齊語録集要目録第一卷博山語録第二卷董巖語録第三卷大仰語録鼓山語録天界語録答問第四卷拈古頌古贊禪警語第五卷書文序疏第六卷偈
