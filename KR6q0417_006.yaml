body:
  text: 首座成正錄偈示董巖達空禪者通達虛空翻白浪好把家私都破蕩有眼不見有耳聾赤肉團中加痛棒從教白醭口邊生佛法塵勞一坦平正念針鋒劄不入面皮鐵鑄沒人情非禮莫教輕動步舉止安詳要回互謾將知見妄疏親拶碎疑團須妙悟不破疑團誓不休放出溈山水牯牛一朝驀鼻穿歸也迥地遮天這一頭示峰頂智建禪者參無字狗子佛性無當下絕親疏如入千尋浪惟求赤尾魚有角非關鯉無鬚不是渠有無俱勦絕直探驪龍珠又如四面火前方一線餘退步即燒殺橫趨亦喪軀烈燄非停止求生莫待徐用意切如此管取發靈樞示參禪偈參禪須銕漢毋論期與限咬定牙齒關只教大事辦猛火熱油鐺虛空都煮爛忽朝撲轉過放下千斤擔又參禪莫論久不與塵緣偶剔起兩莖眉虛空顛倒走須彌碾成末當下追本有生鐵金汁流始免從前咎又參禪沒主宰秪要心不改萬彙及塵勞旋坌誰愀堅硬可擎天勇決堪抒海雖然未徹頭管取前程在又參禪發正信信正魔宮震片雪入紅爐赤身遊白刃只尋活路上莫教死水浸大散關忽開倒跨毘盧印又參禪休把玩倏忽時光換至理雖玄奧秦時鍍鑠鑽咄哉丈夫心著手還自判百年能幾何莫待臨行亂又參禪無巧拙一念貴超越識得指上影直探天邊月劈開胸見心刮去毛有血分明舉似君不會向誰說又參禪須趁早莫待年紀老耳聵眼矇矓朝在夕難保生平最樂事到此都潦倒佛法本無多只要今時了又參禪莫治妄治妄仍成障譬欲得華鯨管甚波濤漾至體絕纖塵妄心是何狀謹白參禪者斯門真可尚為蔣居士薦母叱去泥牛木馬橫拈玉線金針刺出真空錦繡何須向外追尋從來不是眾生何用更求活佛放光動地者誰喚作天真一物示雪航禪人行盡千山與萬山逢人特地放癡憨一朝看破枝頭月始覺澄潭徹底寒示智鐫禪人一片閒雲歸嶺去三間茅屋旁山隈乾坤褁向袈裟裏今日分明付大梅示炤浮禪人行腳問君曾讀五車書管成文似有餘我已搖鞭君信否歸家應笑倒騎驢示成涵禪人省親幾回夢入故家鄉麥飯蔥湯謾忖量踏遍山川圖甚事只須親見本爺娘示志西禪人分明兩口一無舌𥳽土揚塵無間歇突出海門大日輪元來卻是新羅月為六雪禪人入關翻思昔日雲門老關字相酬最上機分付博山誾道者莫教辜負翠巖眉出關始行大事六年雪頓入圓明一片冰今日幸親無縫塔掣開關鎖萬千層示穆禪人逢緣不盡謾云休細看溈山五字牛肯信虛空成粉末劫外無身何處遊示筵禪人落髮當機削去娘生髮露出摩尼頂上珠分付時人高著眼此回親見赤鬚胡答周肯成居士苦海中流弄釣竿從渠漩澓不相參西江涓滴如吞盡沙界都盧一座龕示素真居士請經坰生成一片鐵心腸猛浪狂風頗廝當今日回觀山頂月逍遙誰謂腳跟忙剖塵直欲見全經舟楫何辭泛遠溟怪石狂風穿下過此回始道佛家寧挽劉和鶴孝廉澄江風細浪花開曾得金鱗上釣來抹嗒不隨煙雨散暮雲幾度夜招回歲寒心有幾人知六月梧凋不近時卻憶講經臺上約而今已寫挽君詩示眾禪人一莖草上現瓊樓吸盡支那四百州嬴得清風收白汗何須特地使人愁天高地厚問端繇棒喝交馳卒未休換骨洗腸猶不是誰知屋裏販揚州話頭一句如弦直聞說如何見面親縱是風恬閒不徹還憐活水躍金鱗一句話頭如鐵橛三千里外步如初從來心法無前境大地收來一草廬一句話頭如鐵橛逢人那論是和非直教凍殺阿羅漢春到僧園菜甲肥一句話頭如鐵橛年年九日是重陽旋風八字打不盡開眼明明入鑊湯一句話頭如鐵橛從前知解盡掀翻忽朝白浪滔天地無手人撐沒底船示如是禪人參無字趙州無古今有伶俐衲僧顛倒走若于二處見根源大似面南看北斗破無字兩重關重步登高萬仞山縱饒絕頂橫身過吸霧披雲未可閒筆直路行將去誰管途中住不住只教倒跨紫金毛反側始能張露布海底塵山頭浪奧語玄機都不向月皎風清夜靜時沾著纖毫成莽蕩反覆看不較多泥牛解吼木人歌油瓶丟向籃筐裏笑殺當年凌行婆示六義禪人誰云有六義寧知一字無寄身如浮雲經世一須臾男兒氣浩然眉宇動天樞灼然沒巴鼻迥與生死殊打開大散關壯哉始自娛莫學班白人喃喃讀梵書論義如流水究竟若交蘆真是獅子兒生成鐵額顱又如猛丈夫抒海求明珠只教親瞥地裂破祖師圖示陳居士遍界不曾藏眼根豈能見除是悟心人當下討方便單提句話頭深追與力究纔欲涉思惟圓明成過咎譬如破重關力與萬人敵通身都是膽輸嬴在咫尺那復論危亡亦不分彼我抹轉上頭關無可無不可果是獅子兒不向那邊討力就解翻身根塵光皎皎清風拂夜月旭日盡朝露萬象咸點頭森羅盡回互喚作無事人喚作猛烈漢更擬問如何水浸石頭爛送無澤禪座上羅浮山緬想當年景泰師芟茅搆室海之湄羅浮絕頂恣遨遊鐵橋峰畔連瑤池石門方廣容几席三更日上海水赤漩澓乾坤辯故新吞吐風雲度朝夕上人今往亦何求縱步勤登二石樓倒視滄溟如涓滴一千瀑布稱雄流明月壇邊戒剩有殺佛焚經誇抖擻錫杖源清浴活龍玉鵝峰峻逢花首七十二洞奏天樂百千草木成瓊閣夜深險極轉身難踢破指頭親見腳我亦將來步此山入林端不問人問折桂茹芝間歲月時臨清碧炤衰顏示林野上人真修行辦己事願與釋迦為嫡子迥脫塵勞大丈夫好將名字標僧史住深山棲巖谷那管春花秋草綠一箇閒人天地間饑寒飽煖隨緣足鋤為枕草為氈睡眼摩娑白晝眠西來大意山頭有何必臨機更豎拳不勞心枉費力華藏莊嚴在咫尺大千沙界絕遮欄煩惱無明都解釋不動步是真修體露金風得自繇看破世間顛倒事青林深處一聲鳩示念如上人一口氣不來畢竟甚處去重玄奧義從斯起閻浮走遍萬千遭歷劫何曾離自己識得自己是何顏毳衲橫披露半班峭壁懸崖穿下過方知峰頂有層巒示本宗上人如何是本古路崚嶒踏得穩如何是宗澄江水底口頭紅麻三斤與乾屎橛蹭蹬如吞荊棘蓬識得此心無二法動容不待眉毛眨破爛袈裟撩亂遮崢嶸頭角恣騰踏不學諸方五味禪清風過耳自悠然聖凡家業都拋卻撒手徜徉笑掣顛旋身不踏無明草佛法塵緣都潦倒本源靈湛絕週遮海底珊瑚和日皎示慈門上人一句話頭如鐵橛眉毛不與眼相參究心自古無多事劈破疑團是指南疑團破處無涯岸突出衣珠光燦爛從他八萬四千門門門撞著是這漢臨濟當年赤肉團至今鮮血尚漫漫真人褁向袈裟裏鼓掌難教覿面看只須揣出虛空骨徹底無依休恍惚順流筆直到江西匡廬深處蛟鼉窟五老峰前翠作堆劫風幾變尚崔嵬江濤響入遊人耳莫錯呼為腳底雷示湛如上人圓明湛湛妙無垠如涉纖毫即是塵大地都來銀世界更于何處覓金身休云妄莫分真只知一馬生三寅匝地清風何所有笑看鸚鵡過西秦示吳觀我宮諭一口氣不來畢竟甚處去血肉身心非常住勘破緣生緣不生根塵即是大寶聚鬧市叢中景物披何須山塢與江湄負薪樵子機頭婦渴飲饑餐步不移百草頭邊親祖意母拘路滑恣遊戲謾將佛法當真參沾著些兒成垢膩本來無古亦無今肉髻明珠豈外尋黃鶴樓前伸轉語方知居士問頭深示何芝岳尚書一口氣不來畢竟甚處去靈山古佛親分付回頭石馬出紗籠肯就家庭守珍御淨几明窗自在時花香雲炤碧羅衣夜深月下翻清影無蒂珊瑚露幾枝折杖行兮途路杳旋身逾覺乾坤小不須別樣問通津萬事無如出處好眼動眉舒曰妙存鴉鳴知是幾黃昏依正報中親瞥地迥然無佛處稱尊示方廣野居士一口氣不來畢竟甚處去急著娘生雙眼覷洞然無物飽齁齁逼塞虛空何處住既無住處肯干休鐵壁銀山迸出頭謾道腰纏十萬貫端然屋裏販揚州世緣那更分清濁赤肉團中光閃爍簡箇柴頭品字煨風流何啻三禪樂撫掌捫空意灑然浮山湖畔草芊芊倒騎驢子都遊遍破霧披雲不記年示吳九濤居士一口氣不來畢竟甚處去百年光景從頭數忙忙三萬六千朝莫待臨時申苦楚長安大道痛加鞭行不前兮亦奮然直待九重宮殿裏金爐應有暗香傳翻雲覆雨曹山墮活潑機輪無不可纔欲將心度量來溫州桔皮不是火世間無水謾云波吸盡西江奈爾何酬渠祖意山頭有紫霧紅霞映碧蘿示胡冰稜縣尹一口氣不來畢竟甚處去白日青天誰不睹還鄉盡道是兒孫就裏無容誇佛祖箇中原不立階梯土面灰頭孰與齊欲問故鄉晴雨候須知腳下有黃泥驅耕奪食男兒漢步不移兮登彼岸何必區區藉世燈額上明珠光燦爛夜無惡夢日無驚大地山河一掌平好把虛空百雜碎不期華藏宛然成示宋大山孝廉一口氣不來畢竟甚處去晴是日兮陰是雨翻來覆去見根源裂破胸襟誇步武毋拘坐臥及經行展似眉毛作麼生雨後花香人發笑霜前果熟鳥相爭道人嬾與分時節囫圇不用頻饒舌鐵馬嘶殘劫外風大圓覺裏無豪傑你既無心我也休兩忘何必強追求趙州可煞添鹽醋傾出當年投子油示方肅之館元一口氣不來畢竟甚處去毋問三千七百祖公案交橫眉目間無心理會閒家具法身清淨廁坑籌沒來繇處有來繇一朝拶出通身汗始覺從前滿面羞著衣吃飯隨時好何自稽遲不自了抹轉娘生惡面皮觸著通身都是寶開不成單合不雙後園驢子繫枯樁翻他覷井真三昧隨處逢人豎法幢示林下石居士一口氣不來畢竟甚處去劈頭認取最初步縱橫萬里不離天莫待臨時泣岐路欲知淮甸與江干連絡駢闐車馬殘散盡浮雲開眼看洞庭無蓋法身寒凍殺法身成底事隔岸無分他與自塵塵剎剎絕纖蹤誰道婬房并酒肆峭壁層崖不可攀還期陸地見波瀾風聲鳥語宣真諦都在龍眠煙水間示能止靜主一口氣不來畢竟甚處去穿過千門并萬戶佛法何曾有覆藏只要時人行大路纔有纖毫即是塵幻緣真諦不須分杖頭痛處知端的直下原無第二人譬若行船牢把柁南北東西都看破只圖柂後清風生管他眼底浮雲過不涉廉纖彼岸登傳衣無媿嶺南能深山茅屋誰為主土面灰頭一箇僧示楊蘭似居士一口氣不來畢竟甚處去自古慈門無阻拒寶所非遙趨進時縱橫原不循規矩明中有暗暗中明明暗相參罷問程拗折驪龍頭上角珊瑚枝畔水痕新抖擻通身虛捏怪眼耳鼻舌分疆界捏碎挪圓總不妨自買應須還自賣運水搬柴識得渠從來就裏絕親疏深山佛法依何住鳥宿雲藏月上初示謝中穩居士一口氣不來畢竟甚處去倒卓眉毛別有路㘞地一聲猛省來人在煙雲最深處心如古井不生波笑殺臺山指路婆豎起拳頭明歷歷放開布袋奈渠何覿面縱橫無忌諱當機那論剎那際十方三世絕週遮偪塞誰分心境異塵勞堆裏妙蓮香東土西天謾舉揚更有一言吐不出無人處所為商量示齊季籲居士話頭一句如弦直生逼魚蛇化活龍大地山河成粉末眉毛血濺梵天紅示方奕予居士話頭一句如弦直人在冰山雪洞來時節不同塵世界桃花九月滿園開示姚申甫居士話頭一句如弦直混入方知不夜天路載碧雲雲載月無身人坐案前山示劉君含居士話頭一句如弦直行遍三千及大千掉轉身來何境界夜明簾外月當天示劉爾靜居士話頭一句如弦直水底紅塵山上魚布袋都來收拾盡珊瑚枝上喜跏趺示古田上人話頭一句如弦直劈破虛空膽氣豪按下雲頭收兩腳真情蹤跡在漁樵示止水上人話頭一句如弦直直捷何須論法身果是超方烈漢子腳跟不帶故鄉雲示恒如上人話頭一句如弦直風雨無停竟到家卻笑後園驢吃草夕陽西炤影偏斜示陳聘之居士話頭一句如弦直裂破閻浮猛丈夫倒跨崑崙何處去眉毛睫上好安居示吳鼎甫居士腳跟無地不青山祖意還期顧盻間識得未拈花去處是非不到飲光顏示眾偈話頭一句如弦直地覆天翻不動心只有一條生活計隨緣逾入逾知深又一句話頭如鐵橛碧雲深處有家傳相逢不必重宣說處處春風楊柳天又一句話頭如鐵橛死中要箇活人來六根粉碎成團去優缽羅花遍界開示孤月上人講席都遊遍來參沒味禪鋤雲栽紫芋引水種青蓮邃谷嵐浮樹乾柴火少煙松風與夜月相向不須錢示李若杜居士日明事無別間栽石上花晴空尋鳥跡陽燄摝魚蝦酒肆尋彌勒婬房訊釋迦纔將清濁辨緣境亂如麻示金燦宇居士日用事無別避喧轉覺難飯餘歌晝永燭盡笑更殘一切但仍舊萬般都是閒纔生分別想知隔幾重山示魁杓居士信心功德聚凡聖莫岐分放出唯三要收來只一塵不從他變態毋用自紛紜識得衣中寶何愁徹骨貧又信心功德聚真箇火中蓮曠劫元無異今生幸有緣揭開塵界網印破水中天最喜金剛寶光明炤大千次曹能始廉憲韻示諸同行者登山須及頂縱步莫移時路險惟憑杖岐分必問師雲深行趁早日落悔來遲力盡機忘處堂堂我是誰贈宮保元勳徐六岳居士不忘靈山親付囑長安大道行人速一鞭木馬踏花飛九重宮殿爐煙馥閒拈拄杖撞虛空逼塞誰分心境同到得還家花未老白雲依舊故山中贈徹候方心寰居士不忘靈山親付囑大鵬久住金剛窟但問歸家歸未曾休將古德商遲速虛樓百尺倚晴空門閉梯捐路自通不動步時彈指入樓前木馬夜嘶風贈勳卿詹見五居士不忘靈山親付囑紅塵豈障參禪骨雲衣不掛忽然甦滿目桃花春簇簇春風吹樹看春來露柱生兒笑滿腮識得無生親的子任君掩耳過經臺贈大鴻臚顧醒石居士不忘靈山親付囑這箇都非心佛物驀爾通身熱汗流一味之間百味足百味誰嘗一味非旅中無繫自知歸解道澄江靜如練令人常憶謝玄暉贈冏卿徐南高居士不忘靈山親付囑紅藕池邊波可掬通身獨露放光明萬里山河清淨目庭生瑞草未為奇瓮裏醃虀變紫芝碧眼胡師吞未盡酸甜只貴大家知贈冏卿何天王居士不忘靈山親付囑識取未生前面目柳風梧月主人醒掃花閒殺樵青僕春到黃鶯語亦親半塘遙隔見通津還他寶釧金羈子任我穿衣吃飯人贈勳卿俞容自居士不忘靈山親付囑學道先教無厭足假饒已悟更加鞭管取千魔俱殞沒護持須護自心王冰雪中間別有香大著眼眶看仔細丈夫眉宇舊昂藏贈侍御徐孟麟居士不忘靈山親付囑光明智火燒殘牘逢人何處著商量盡日芙蓉看未足芙蓉霜刃向雲磨魔佛繇來奈爾何露布已聞鐃吹奏太平端許臥山阿贈侍御任文升居士不忘靈山親付囑緣生世諦多林麓剖開慧眼顯全機肯向塵緣空碌碌突出衣中無價珍從來見處不依人大圓覺體光明藏淨白元無一點塵贈侍御吳黃岳居士不忘靈山親付囑清光靄靄彌山谷舉頭誰不見青天男兒肯向他尋逐待客迎賓事事長跬步何曾離本鄉了知動轉非他物優缽羅花遍界香贈民部朱羅青居士不忘靈山親付囑回首紙穴凝蠅出疑情舉處要分明莫把心量重卜度大千經卷一塵微只貴當人剖出之曾向洛陽官裏過春花春鳥總宜詩贈祠部蔡聖龍居士不忘靈山親付囑慧燈好向風前續青天白露鷲峰明更從何處分真佛無分無別阿誰知當下知歸我是誰猛火煆成清淨土一聲孤雁夜聽遲贈司馬麗序皇居士不忘靈山親付囑春氣非傳紅與綠一念攀緣眼底花片言玄妙膺中物空諸所有實諸無活殺從來是丈夫山色溪聲還跳出鬧藍風雨對屠沽贈司馬曹安祖居士不忘靈山親付囑浩然氣宇餐天祿堂堂妙用絕周遮百匝千重光晃昱底事分明說似君碧空花雨亂紛紜飯餘柳岸經行慣清風微動水成紋贈繕部吳泊如居士不忘靈山親付囑海外波斯雙赤足夜來龍藏掌中生鎚碎休教添碌碌俊骨摩天秋氣高虛空無物見纖毫驅耕奪食男兒事一任西風爽布袍贈繕部王季常居士不忘靈山親付囑雪冷須彌偏突兀拈來青棗大如瓜見後桃花青似菊熱油鐺舐大方饞莫使重留貼肉衫到得感恩知愧日許君親見老香嚴贈虞部白雉衡居士不忘靈山親付囑社舞村歌堪薦入歌聲鼓節遣誰聞耳中供個觀音佛虛空消殞一人邊草淨湖南萬里天一句相憑重道當石人雙耳聽聲前贈水部周敏山居士不忘靈山親付囑珊瑚影映澄江綠清風明月兩相知蓮花水面如車軸石頭城外草芊芊踏月穿雲知幾年一自洞庭歌罷後至今花雨尚翩翩贈田曹金蘿石居士不忘靈山親付囑禪林直豎蒼山骨迥然一念射當人此是吾家真種族空花輪轉本來無迷悟俱非井覷驢討得钁頭些子味臥雲嘯月種松株贈田曹吳鬯膏居士不忘靈山親付囑刻刻須教深入木和身迸透頂門開六六原來三十六鐵船無恙海潮通月落沙寒釣已窮若向此中親薦得竹簫吹過斷蘆中贈國博丁蓮侶居士不忘靈山親付囑蓮花漏裏西裝俶一輪海日兩頭忙六字彌阤千遍讀口中讀讚心思惟直下追尋影自隨生則決生去不去子規啼過古梅枝贈國博錢叔蘊居士不忘靈山親付囑寶華淨界無延促眉眶之下鼻頭垂何人解把舟行陸方舟渡子不曾迷說著河源卻未知雪滿短簑寒夢破自驚身是釣魚師贈奉常林如沖居士不忘靈山親付囑熟處當生生處熟卻將生熟一鐺煎跛鱉盲龜稱萬福出門何地不青山傍晚征夫閒未閒開徹碓花供醉眼磨成磚鏡炤衰顏贈中秘吳文孫居士不忘靈山親付囑頭頭法法光明域虛堂無事一聲雷野狐跳入金毛窟金毛獅子解翻身這裏分明不昧因吐卻狐涎入狐隊出山人是住山人贈進士汪叔度居士不忘靈山親付囑康莊車馬偏難忽黃塵冉冉遍天涯憑君拭洗青山俗青山無況著秋煙鹿草龍芝種玉田獨有一年收未得祖珍拋散禁城邊贈孝廉沈得一居士不忘靈山親付囑得意華騮風趁足奔騰蹴踏見分明萬里空山尋古宿尋人花影落繽紛玉帶誰教報衲裙合有臨行饒舌處鍾山雲似博山雲贈孝廉陳賁生居士不忘靈山親付囑白石蒼松堪擊筑擊出針鋒一線通千流萬派堪漩澓山頭白浪海中塵囊裏無錢賸買春月滿珊瑚枝自露跏趺應笑劫前身贈孝廉徐六虛居士不忘靈山親付囑宗門豈傍他人入英雄眼底笑男兒清風古路無迂曲參禪先令識心閒錦鯉成龍一躍間皮袋生光情愛盡淡將言句寫溪山贈奉常曹清之居士不忘靈山親付囑參禪莫就禪中宿當日惟知劍柄長而今始覺毬門複枯椿未始是枯椿觸處風搖白玉幢萬里泥牛奔影去碧雲無賴滿春江贈廣文陳允嘉居士不忘靈山親付囑斷崖峰頂黃茅屋十方坐斷見春風撥雲夜看千花谷跨著楊岐三腳驢不逢渠處也逢渠解開布袋憑人看妙用臨機果不殊贈參軍張時華居士不忘靈山親付囑十年豫造征人服征人未免挂征鞍會免臨岐多倉卒繡幢煙影碧油車放出南山鱉鼻蛇若道葛藤猶未斷一杯清供趙州茶贈參軍周元執居士不忘靈山親付囑牧童明月騎歸犢未到人牛不見時休隨草色平川綠雨餘芳草是前村牧笛無端欲斷魂卻向古鄰荒寺去大家扶起破沙盆贈司馬劉斗漚居士不忘靈山親付囑縱橫出沒無拘束閒雲蹤跡渺天壞魔佛從來皆眷屬放生容易殺生難火宅之中叫野干露地白牛車上坐寶鈴珠網夜天寒贈光祿吳淳太居士不忘靈山親付囑缽盂中是千鍾粟橫吞一粒齒牙香卻笑饑人果空腹一粒原來何處生大千心畝廓然平夜來賸有栽秧雨好向綠楊聽曉鶯贈典謁葉翼所居士不忘靈山親付囑花蜂豈就枯枝宿鑽向銀山鐵壁中他家好似無情物場開選佛看登壇莫道心空及第難踢殺猢猻縛殺鬼不知菩薩是何官贈宮端丘言思居士不忘靈山親付囑彌陀一句無真俗數珠繩斷佛聲消卞和剖破荊山玉分明寶鏡映千燈擇葉尋枝我未曾識得燒菴真供養泥牛搖尾過窗櫺贈孝廉李在璞居士不忘靈山親付囑修幢拗折瀟湘竹實相門開聲悄然短衣破笠黃金域江風淡蕩法身寒江雨凄清夜未殘休把鵑啼比鶯語萬花叢裏現優曇贈中翰葉白於居士不忘靈山親付囑期君試聽無生曲無手人彈無耳聽聚合從前親骨肉團圞何處問他方一片空心選佛場打鼓卻看誰作主釣魚原是謝三郎贈問卿余集生居士不忘靈山親付囑爾自彈絲我吹竹合成一調供眾生梵天花雨成夭穀攪不清兮燒不香捉賊須教有正贓溺器踢翻清夜曉傳燈名字間僧行贈都閫余周生居士不忘靈山親付囑日午虛窗剔明燭廚前巧婦細思量自笑能炊無米粥諸天同器不同餐肘後金符近已刓馬足似雲弓似月將軍今夜下三韓贈太學方士雄居士不忘靈山親付囑青山滿目原非物荊棘叢中穿過時何論橫趨與直入旋風八字打將來寶網金繩觸處開萬壑千巖春自煖兔光和露護珠胎贈太學汪吉所居士不忘靈山親付囑加鞭倒跨泥牛犢牛背頻將鐵笛吹聲聲韻出無生曲無生曲子孰賡和石人解拍木人歌遊遍支那歸去晚衣冠之下古彌陀贈文學陳旻昭居士不忘靈山親付囑瓊苗遠發瀏陽佛揚吾家醜逼吾忙管保千生受塗毒千生只在一朝圓毒鼓聲騰萬馬先廓爾子韶明物格紫雲金殿暗香傳示余得之居士不忘靈山親付囑日用何妨耕與讀書中全露聖賢心大似良田獲嘉穀聖賢俱自道場來儒釋源流莫浪猜會得拈花微笑旨龜毛拂子舞三台示泰水禪人一口氣不來畢竟甚處去剔起眉毛知住處銀山銕壁也須開劈面當機解回互大力量休恐怖趙州略彴古今傳笑看幾多驢馬渡示鄧九如居士頓悟心源開寶藏灼然笑點馬師圈頂門果具摩醯眼黑白終歸句下圓示李何事居士頓悟心源開寶藏摩娑睡眼見青天現成公案重拈出三個猢猻夜𥳽錢示傅遠度居士頓悟心源開寶藏衲衣底事有來繇囫圇吞箇青州棗直至而今飽不休示劉今度居士頓悟心源開寶藏庭前柏子話偏長道人不諳西來旨一陣清風一陣涼示鄧直卿居士頓悟心源開寶藏家風不與世人同百千萬種諸三昧只在尋常語默中示劉文長居士頓悟心源開寶藏全身領荷亦遲遲更思吸盡滔天浪笑倒江西馬大師示葉對育居士頓悟心源開寶藏肘後靈符衣裏珠幾多玄妙都拋卻認取楊岐三腳驢示王有功居士頓悟心源開寶藏毘盧頂上好安居須知別有通霄路烈漢從來不畜書示吳叔達居士頓悟心源開寶藏隨聲逐色過朝昏一條拄杖穿雲走得失親疏總不論示瑞崖上人頓悟心源開寶藏扶桑元在海門東衲衣時藉雲霞補剪尺無煩問誌公示泡菴居士頓悟心源開寶藏眉毛血濺梵天紅橫拈寶劍當陽擲觸處逢渠振祖風示元淳居士話頭一句如弦直耀日精金覿面看行過水晶宮殿去門前尚有玉欄杆示顧長卿居士話頭一句如弦直甘露還從天上來八角磨盤親撥轉無根樹子倚雲栽示姚鄰卿居士話頭一句如弦直進步寧知行路難稍得順風催客便蕭然無意過三灘示劉自度居士沒蹤跡處莫藏身釣盡澄江躍浪鱗藏身之處沒蹤跡華亭兩岸花狼藉迸破虛空別有天綠楊深處草芊芊更須簡點家常事跛腳驢兒在後園示汪心鏡居士來機即赴未為難背觸俱非肯綮間大火聚中看變態真文不欲露全班
