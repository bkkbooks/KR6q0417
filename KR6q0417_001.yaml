body:
  text: 首座成正録博山語録師住博山有年未嘗開法後因禪衲輳集四衆啓請乃升座拈香云此一瓣香金藏雲而嚴枝幹香水海以潤根株龍樓迎瑞而紫氣飛騰寶殿籠煙而祥雲遍布爇向爐中端為祝延今上皇帝聖壽萬安皇后齊年太子千秋福基同華藏以莊嚴壽算共毗盧而等量更祈檀那衍慶海衆安和此一瓣香淨明日月曠蕩乾坤空覺性而無佛無生薰萬彙而有因有果爇向爐中專伸供養壽昌堂上本師無明大和尚用酬法乳之恩斂衣就座白椎竟師乃曰佛不求佛心不傳心如水與水似金博金會得也目前包褁山闊猿長嘯會不得也目前包褁林疏鳥不驚會不會總目前包褁空宣無相偈即此包褁也須包褁水操沒弦琴諸昆仲於此徹去以須彌山作四大海白浪滔天以四大海作須彌山紅塵滿地烹虛空之髓而滋味恆新挑水底之燈而光明亙大這裏無加芒索個中何用金針所以道指南一路智者知疏向上一機石人撫掌開彌勒之樓閣而行願重重踏毗盧之頂門而毫光爍爍到此則步步通玄智不能知識不能識諸昆仲此是故鄉景象若肯就路還家便得轉身歸父還肯麼自是不歸歸便得五湖煙景有誰爭上堂傾湫倒嶽大地全收𥳽土揚灰纖塵不立全收則該羅廣博須知白晝雞鳴不立則淡泊虛明誰解紅塵犬吠是佛亦打是魔亦打管甚船來陸來飢也一餐飽也一餐且喜柴乾水便沒蹤迹莫藏身一雙赤手逢人且乞一文藏身處沒蹤迹兩朵攢眉遇佛堪消三拜吾在藥山二十餘年方明此事親言出親口莫使外人聞諸人藏身處博山總知博山藏身處諸人不知諸昆仲今日在此法筵不免覿面相呈若到諸方逢人不得錯舉珍重上堂冬不寒臘後看老儂不愛雪稚子哭衣單惟有東村一箇沒傝漢髼頭垢面赤手空拳寒不怕寒熱不怕熱最冷唱個雪詞兒最飢做箇糶米漢無一文錢要與天下人鬥富無一分色要與大地人爭妍有時在十字街頭倒騎鐵馬有時在西洋大海逆上須彌有時在烈火焰中嚼冰嚙雪有時在紅塵堆裏掐草挑燈有時指東話西有時呼南為北將三乘法塹以作門牆指十地菩薩而為眷屬諸昆仲斯人還合伴不合伴復笑云已被博山收下了也上堂至理不渝至功不宰至道不形至了不辦於此四句相應便做箇灑落衲僧眼不染玄黃腳不沾泥水意不緣諸法舌不親玄旨到此則圓機普應玄度該通淨體無依靈明絶待所以玄沙大師云羅籠不肯住呼喚不回頭古聖不安排至今無處所諸昆仲今時禪者不信自心是佛向外求佛不信自心具足諸法向外求法既昧自心縱有弘為皆生死之業耳又當知求佛求法即有所依既有所依於自心不得自在譬如窮子伶俜辛苦乞食自濟昧卻衣裏無價寶珠豈智者乎夾山大師偈云勞持生死法惟向佛邊求目前迷正理撥火覓浮漚無事久立珍重誕日上堂本無今有笑看鏡裏狂花本有今無攪動巖前湛水一片白雲瀰漫幾多花鳥迷蹤拶碎虛空爐鞴烹煎佛祖高揮寶劍草鞋救取貓兒還他一個皮囊贏得五湖明月所以大覺世尊捨王宮入雪山睹明星開道眼於三七日中思惟是事然後開權顯實説三乘法及至末後拈花示衆便云有教外別傳簡點將來如夢境相似博山生居黎庶無王官可捨遊化東土無雪山可入大地黑暗無明星可睹奴郎不辨無道眼可開然則貴賤雖殊要且頭腦相似自幼便可憐生二十以前成家樂業二十以後花擘家財三十以前向北鬱單越解三玄戈胄三十以後在南贍部洲碎五位鎗旗四十以前你要去我鉤兒鉤你博山卻不鉤你任你千里萬里四十以後你要住我有錐兒錐你博山卻不錐你任你在蟭螟眼裏今日正當四十歲鉤錐一齊息博山不在這裏博山有一塊古地基自天台韶國師開創以來千有餘載雲峰信道者克紹相繼亦數十餘年今日在此説法是本有今無耶諸人面前不得説夢是本無今有耶諸人面前不得説夢看破夢境時如何諸人面前不得説夢何以故個中求其生無生不可得滅無滅不可得有本有不可得無本無不可得又將何而為壽也以諸佛身衆生身為壽聖凡不可增減以過去劫未來劫為壽日月不可遷移以妙高峰娑竭海為壽燥濕不可損壞以盡虛空遍法界為壽天地不可覆藏然雖如是今日因甚麼喚作四十歲良久云棲鳳巖前雲霧捲伏牛山下古今傳上堂神藏禪師云知而無知不是無知而説無知良遂禪師云良遂知處諸人不知諸人知處良遂總知荷澤禪師云知之一字衆妙之門高峰禪師云知之一字衆禍之門諸大老敲唱傍提各具一隻眼博山今日不惜唇吻從頭注解秪要告報諸人知而無知頭腦相似不是無知而説無知火燒眉毛救取一半良遂知處諸人不知大似壓良為賤諸人知處良遂總知多知老翁莫與相見知之一字衆妙之門把手牽不入知之一字衆禍之門腳頭腳底知字亦不惡諸昆仲博山恁麼注解還會博山意麼然雖如是博山決不恁麼道無知而知為之知知知之為知不知為不知諸昆仲還有不向知上作活計另有超群拔萃者麼當知水琴松韻堪傳赤子之心赤尾金鱗不墮漁人之手且道與古人同耶異耶復云東西南北十萬八千臘八日上堂維那白椎云法筵龍象衆當觀第一義師云第一義作麼生觀覷著則眼瞎嗅著則腦裂舉步絶行蹤動念非生滅眼色耳音聲心忘思路絶古今諸聖賢同途而異轍中峰水底琴馬師天上月投子手中油趙州庭前柏博山無可示梅花枝上泄吐翠與含芳凝寒傲霜雪清香滿十方觸著通身血捶手哭蒼天浮杯老結舌諸昆仲當時釋迦文佛於臘月八日抖碎虛空七花八裂盡大地無一人會得所以寶坊云不是凌行婆怎解同心結上堂在迷迷悟在悟悟迷從來迷悟似迷今日悟迷非悟迷悟兩頭拽斷聖凡更復何言剔起眉毛惜取眼中瞳子綻開衣線露出鐵石心肝燈籠與露柱相交佛殿共三門鬥額赤手團成泥彈子紅爐煉就鐵饅頭一任東擲西拋畢竟埋光鏟彩從教野狐精巖中脫殼轉轉不錯笑殺赤鬚老胡要知水牯牛山下投胎卓卓全該須是溈山大士諸昆仲溈山大士作水牯牛博山頭角生已久矣還有人證盟也未良久云達磨大士來也放過一著元旦上堂春風才動春花開春雨相催春水來惟有通玄峰頂石依前白蘚與青苔大衆如何是新年頭佛法復云東西林下鳥添得好音聲解制上堂誰云結制仍解制縱有成規俱不是當空拋下雲門柴雪浪銀花匝地開簡得多年破木杓鷂子飛過新羅國你既無心我也休後代兒孫笑酒樓香巖粥飯長行者擊竹有聲聾兩耳翻思昔日老靈雲一見桃花眼睛誰是迷兮誰是悟春風觸著珊瑚樹誰是悟兮誰是迷具足從前自家底心不心兮物不物連書幾個向空咄諸昆仲因甚麼書幾個向空咄復合掌云我不敢輕於汝汝等皆當作佛上堂諸昆仲凡心入覺須善用心不善用心魔得其便所以一個計字出九十六種外道一箇著字出五十蘊魔及魔王眷屬等具在教乘不可不知經云譬如有孔隙處風則能入搖動於物而不自在菩薩亦爾若心有間隙心即搖動而不自在乃至成就皆魔業耳何謂魔也歡喜是魔也煩惱是魔也昏沉是魔也掉舉是魔也懼動是魔也厭靜是魔也喜談論是魔也愛遊行是魔也乃至斥像毀經破律犯戒拈頌機緣擅開異解詩賦詞章文藝雜學併貪求説法悉是魔也所以博山教諸昆仲提一則無意味公案蘊在八識田中當下不知有血肉身心前境不知有山河大地非內非外滾作一個疑團行不知行坐不知坐如一人與萬人敵又如心心常似過橋時直須發明此事到磕著撞著打破疑團通身是眼縱遇釋迦大師摩頂授記佛亦不做何況魔軍而能入耶諸昆仲如斯會去誰不丈夫雖然如是事怕有心人直須當下一念無生超彼三乘權學等見若將心令無心卻成有直須覓心了不可得即證超魔法門上堂水流濕火就燥是水有魚是林有鳥喫飯咬著舌頭解道青天不用掃諸昆仲須自了同個夜兮同箇曉試將此語播諸方謾道荒田不揀草更看雲門拄杖子化為龍吞卻山河大地了諸昆仲且道博山即今在甚麼處良久云深固幽遠無人能到下座開光解制上堂九十日期今已解百千三昧許誰知畫龍未必乘雲去可惜人間十二時十二時辰彈指過眨起眉毛還是錯衲衣撩起伴雲眠磐陀石上松花墮聞見清兮清亦非法身無病不求醫頂門突出摩醯眼夜半烏雞帶雪飛帶雪飛兮貴回互金鳳不棲無影樹縱橫十字數將來佛祖位中留不住留不住兮劈面來兔角龜毛眼裏栽今朝拄杖橫挑出那個男兒肯活埋諸昆仲今乃解制之辰遇無量壽如來為汝諸人普作佛事放大光明照十方國土無所障礙更以無礙神力將極樂娑婆融成一界若説是淨土卻是娑婆若説是娑婆即是淨土且道無量壽如來畢竟居何國土今日博山親指出分明一點座中圓上堂僧問金鐘才扣雲堂已露真風法鼓重鳴海衆更申敗缺正當恁麼時和尚如何結案師卓拄杖曰山水之間得渠儂力進曰某甲從此信入去也師云信後如何進曰向後與和尚更道師云分作兩橛作麼又僧問昔九座大師云我今日向孤峰絶頂駕一隻鐵船截斷天下人要津秪如和尚今日又作麼生師云鐵船即且置闍黎要津呈似老僧看進云爭奈學人不會何師云不會請人裁進云恁麼則剛道是龍猶不信等間奪得始驚人師云間言語復曰諸昆仲佛法不是容易博山三十年來實際理地洞然無礙事法中較量與理矛盾者尚多即今與諸昆仲升堂入室結個粥飯因緣於此座上問來答去如鳥云空如鼠云唧雖有其聲究竟將來都無實義豈但無益恐成賺誤若是祖師門下客要知祖師行徑方有説話分單明自己底不知有古佛家風此人有眼無身若明得古佛家風不知自己用處此人有身無眼直饒坐斷兩頭不通凡聖轉身氣急猶在半途更須知有全提時節始得大丈夫兒步入重玄睜開隻眼解作家活用不乖方斂沙界于毫端纖塵匪礙耀珠光於域內洞鑒無遺如日月光遠近斯照拈拄杖云還有恁麼衲僧麼僧問透網金鱗因甚猶滯水師云度盡無餘影還他越涅槃進云恁麼則縱橫滄海闊騰躍萬波隨師云作麼生説箇騰躍底道理進云分明頭角久春江雨露微師云念文章可惜許師復拈拄杖云還有問話者麼衆無對復曰今日老僧失利誕日上堂僧問莊子八千椿正眼觀來猶存數量大通塵點劫衲僧門下尚在半途壽等虛空泯絶途量一句請和尚指示師云玄沙元是謝家郎進云和尚與玄沙同生去也師云年年桃李樹處處白紅花進云這箇且置秪如當時韓文公問大顛和尚尊壽多少顛提數珠云晝夜一百八今日座中諸大檀越或問和尚法臘多少和尚如何應對師曰漩復黃河水進云如是則和尚與大顛人有今昔壽無兩般去也師曰乾三長坤六短進云冰桃雪藕非為敬直奮空拳上法王時如何師曰坤在上乾在下僧禮拜云謝和尚答話師乃曰天地旋山河走石女生兒世間希有白向本爺娘乾坤兩眉皺今日無端舉似人灼然笑破虛空口諸昆仲若道博山有生是不諳佛法若道博山無生是不諳世法生與無生拈放一邊且道四大色身從甚麼處得來良久云乾闥婆神無限樂宮商不與世和同首座問石女生兒得幾個師曰五男二女進云和尚生身父母在甚麼處師喝一喝下座佛成道日上堂僧問雪覆千山無點白雲空萬里絶纖埃未審甚麼人到此境界師曰無縫襖子足風涼進云向上更請和尚道師云秦望嶺頭雲楚人那得見進云還許學人進語也無師云試説看進云恁麼則禮拜去也師不顧復云法本法無法庭前瑞草和根拔無法法亦法黃河九曲金沙混流今付無法時釋迦鼻孔長多少法法何曾法瞞博山一點也不得諸昆仲釋迦大師四十九年橫説豎説逆説順説誰人奈得渠何及入涅槃時以虛空為口滄海為舌日月星辰為莊嚴山河大地為聽衆橫説豎説逆説順説要且無人得聞博山今日在此座上橫説豎説逆説順説誰人奈得博山何博山今日不待涅槃即此座筵以虛空為口滄海為舌日月星辰為莊嚴山河大地為聽衆橫説豎説逆説順説要且無人得聞這裡有些子淆訛諸昆仲過去釋迦大師所説法要無人得聞即且置現在博山所説法要因甚無人得聞這裏若緇素得出許你親見博山既見博山即見釋迦大師若緇素不出縱見釋迦大師要且不見博山何以故有口非干舌無錢卦不靈下座上堂撲落非他物縱橫不是塵山河并大地全露法王身古人恁麼悟去大似喫常住飯作自己事博山則不然行年四十九皮骨若枯柳四大體自如面南看北斗博山恁麼道大似喫自己飯作常住事徐六擔板各見一邊更有一偈為之解嘲不免總説向大衆去也祖父田園自家産業匪守珍御不生下劣才涉思惟平地遭醉酒臥街證龜成鱉博山恁麼道早作死馬兒醫汝等諸人也不得鑽龜打瓦珍重首座云某甲不似和尚師曰汝又作麼生進云行年三十七通身赤骨律不喫常住飯砵盂兩度濕師云卻是汝來得要且不會老僧意在上堂僧問蟄戶將開海門雷震敢問和尚一池鱣鮪何時際會風雲師云拄杖時常頭點空進云興波作浪時如何師云闍黎腳跟下水深多少僧咦曰透網金鱗雖振鬣沖霄丹鳳不遺苞師云更須按下雲頭始得又僧問乍入叢林蒙師命往白下請有字經敢問和尚無字經命向甚麼處請師云磕破髑髏僧禮拜師曰便秪如此耶出去又僧問近闡宗猷既非臨濟溈仰不是法眼雲門未審香火因緣從誰結得師曰渡河落影子進云大好山頭一針鋒地容盡大地衲僧因甚麼這坐具也容不下師云闍黎曾到峰頭麼進云已拈玉線芒請露金針穴師云急著眼覷進云更有話問請師垂慈師云不妨舉著進云如何是功師云三人同一春進云如何是共功師云力士舁杖鼓進云如何是功功師云猢猻上露柱進云不得敲唱雙舉請示正中妙挾師云高低雲繞樹進云謝師答話去也師云遠近鳥銜花師復曰春日山多霧樵人路徑迷縱然得入戶腳下有黃泥諸昆仲冰厚三尺非一日之寒水漲千溪非一日之雨朝聞夕死非一日之功立地成佛非一日之行所以釋迦大師曠大劫來難行能行難忍能忍為我等故修諸苦行成就無上正真之道正為我等今日事且道今日事又作麼生若向今日會去與釋迦大師共一皮袋子豈但釋迦大師與恆沙諸佛共一皮袋子一心一智慧力無畏亦然于彈指頃成就無量無邊妙行具足無量無邊莊嚴圓滿八萬四千諸波羅蜜門其或未然而言凡聖齊同如持爝火擬比太陽又如初生鳥雛欲沖霄漢多不自諒也首座曰和尚道冰厚三尺非一日之寒冰解後如何師曰七花八裂進云水漲千溪非一日之雨天晴後如何師云石頭露也進云朝聞夕死非一日之功如何是無功之功師云闍黎向上覷著進云立地成佛非一日之行如何是無行之行師曰著衣吃飯未為分外進云和尚皮袋子與釋迦大師皮袋子重多少師云半斤八兩上堂僧問今在人天衆前作麼生相見師云是水東流進云和尚安住在甚麼處師云門前剎竿二丈五進云花落月明時又作麼生進步師云憑闍黎跳躑進云石泉一線水源從何處來師云喉嚨下進云流向甚處去師云頂門上進云高低物象一顧齊平遠近音聲衆響斯應是何人境界師云沒來繇漢進云幽間鬼如何殺得師云借闍黎刀看僧擬議師振聲一喝師復云明暗交參正偏綺互言中有響句下無私揭開雲霧見青天畢竟是誰遭點額龍門萬丈笑看足下風雲金彈一丸播弄手中戲具古人道一人所在亦到拄杖子不會諸人卻會得半人所在亦到拄杖子會得諸人不會所以道石人機似汝也解唱巴歌汝若似石人雪曲也應和恁麼商量惟木上座卻較些子珍重上堂僧問如何是法身理師云伸手不見掌進云法身向甚麼處安立師云暗地始驚人進云未審法身是何境界師曰山河大地進云離了法身又且如何師云爍破四天下僧禮拜師云是法非法是心非心非法即法非心即心打翻漆桶大地平沉雲門大師甚是奇怪盞子落地碟子成七片又云扇子𨁝跳上三十三天築著帝釋鼻孔東海鯉魚打一棒雨似盆傾諸昆仲博山今日亦如雲門大師氣宇如王若渠來相見時又作麼生定奪衆無對師云拄杖不在苕帚柄聊與三十何以故若不挫其來鋒將來必成過患上堂道非明暗法離有無布袋頭邊逴得看來猶是半途直饒坐斷毗盧不通凡聖旋風撲面氣急殺人直下相逢不是渠轉位旋機沉毒海諸昆仲若言即心即佛大似黃葉止啼又云非佛非心還如夢中説夢不是心不是佛不是物是甚麼碗塌丘江西老宿恁麼説法尚喚作口裏阿漉漉底諸人分上又作麼生諸昆仲莫秪論他非是好門前更有鳳凰山上堂甚麼物恁麼來重門關鎖一時開甚麼物恁麼去佛機不隔時流意靈山會上有多端立雪庭前無二致甚麼物幾多般見未分明莫浪傳嘗記寶方言道好天非高大海非寬説似一物即不中多情不用眉毛動修證即不無染污即不得丫角女子髮如銀病中勘破維摩詰即此不染污是諸佛之所護念粉碎虛空撲地來百匝千重成一片諸昆仲既不似一物畢竟似個甚麼有眼無耳朵六月火邊坐任是同胞生也須更問過更問過是甚麼良久卓拄杖子云拄杖子卻辨得佛誕日上堂王宮未降佛事已周腳跟下好與三十棒未出母胎度人已畢腳跟下好與三十棒四十九年説夢取笑旁觀腳跟下好與三十棒三百餘會周遮糢糊正眼腳跟下好與三十棒忽遇惡水潑來即周行七步目顧四方自云天上天下唯吾獨尊腳跟下好與三十棒獨有雲門大師云我當時若見一棒打死與狗子喫卻貴圖天下太平雲門用此惡辣手段始能豎立宗乘若是倚牆靠壁漢又胡足道博山三十棒略與通信座中還有下得惡辣手段者麼良久云黃金自有黃金價切莫和沙賣與人首座問雲門一棒博山三十棒是同是別師曰出門是路進云未離兜率已降王宮未出母胎度人已畢因甚麼又喚作四月八日活佛降生師曰爭怪得渠進云諸佛出世為一大事因緣和尚出世所為何事師云笑看天花滿裓進云佛祖來償口業債未審是何口業師云惡毒糾纏進云設中道持戒但束身非身無所束因甚麼千佛出世又與人授戒羯磨師云羅浮原在廣之南進云前無重難後無輕遮方堪受戒或遇箇大闡提漢殺佛殺祖底出來未審還與他受戒麼師云堪為來學典刑留待別時供養進云恁麼則和尚性命落在此人手裏也師云老僧甚得便宜進云法施殷勤且酬三拜師云止莫礙第二座問上堂古德云日月未足以為明是甚麼物得恁麼明乾坤未足以為大是甚麼物得恁麼大博山今日不惜唇吻與汝諸人注破卓拄杖云拄杖子眼光爍破恆河沙世界明耶非明耶恆河沙世界在拄杖子裏許大耶非大耶諸昆仲秪是根拄杖子又何得論明論暗論大論小大小明暗悉是對待之法然雖如是也不得草草何以故要知幽徑趣須辦半年糧珍重上堂師方升座二僧問不稱理各賜棒復云毛吞巨海海性無虧芥納須彌芥空宛爾若道是神通妙用斯人未達其源若道法爾如然猶是拍盲狂解是以二人各責三十棒趁出三門外去諸昆仲只須析毫端而瀉海水碎芥子以露須彌旋嵐偃嶽而絶纖塵競注江河性諸昆仲萬花叢裏去住揣空出骨何難清涼地上謳歌白日挑燈有據到此則正偏旋復雲樹絶依古木森然靈禽不住菩提涅槃真如佛性喚作破草鞋且拈放一邊各人衲衣下䊢洗錢布施些子還肯麼毗目仙人執手時善財眼底微塵佛珍重上堂三界無法何者是生三界無法何者無生生與無生二俱增語若謂是生前村古路坦然平若謂無生海門波浪萬千尋若道生即無生樓頭戌鼓正三更若道無生即生彩筆將來畫不成諸昆仲幻化門頭高著眼莫將陽焰亂紛紜生與無生姑置勿論且道二六時中折旋俯仰必竟承誰恩力良久云六窗虛淨無依將來用度恰好珍重上堂大道虛曠無有程途幾動之微自當審細若藕絲而牽大象匪假神通如寶樹之宿蟭螟難窺異色活中死句笑容含冰鐵之姿死處活來寒谷動陽春之焰更須知當機劈面毋待指陳互換相資那容湊泊諸昆仲當此時也寒灰發焰雪覆紅爐水玉相銜誰能料揀若有人料揀得出博山明窗下安排著珍重在壽昌守先師七衆請上堂一二三四五六天地位萬物育箇中有個無角泥牛東觸西觸至今無處藏蹤秪得和塵混俗更須知平處險直處曲擊破重關謾輕忽太平宇宙斬癡頑此是禪宗親付囑親付囑破驢春上蒼蠅出達磨未識參禪孫臏不解貨卜惟有壽昌老人一生向鋤頭上七縱八橫至今也填坑塞窟諸昆仲還有為堂頭和尚出氣者麼今日幸有博山不肖兒孫為伊雪屈結制上堂天地與我同根萬物與我一體時人見此一株花如夢相似諸昆仲古人於黑漆桶底鑑貌辨色無影樹下笑月吟風掣開金鎖玄關扯破漫天網子博山則不然有人問天地與我同根萬物與我一體意旨如何秪向他道昨日有人從燕京來寄得廣南信豈不見溪山各異而雲月是同又云時人見此一株花如夢境相似意旨如何秪向他道不見人無遠慮必有近憂珍重開光上堂佛身無為不墮諸有慈德聲名垂不朽今朝覿面絶周遮眼上眉毛誰不有丹霞撥火而尋舍利善現晏坐而睹法身雲門用棒以酬恩洞山用麻而報德這一隊老漢雖則一期方便怎奈千古顢頇何似博山將大冶紅爐一模傾出使天上天下有情無情睹端嚴之妙相植菩提之正因度普耀之通津趨妙嚴之果海紫磨金聚咸轉根本法輪白玉毫光旋入普明三昧使大地衆生各各相謂有佛出世各各自見己身作佛無有衆生無一衆生相者如是則無施者無化者無造者無受者亦無見者何以故施者乃至見者如夢幻故山河大地草木叢林情與無情世出世間如夢如幻故乃至諸佛出世諸佛涅槃影現其中如夢如幻故還有不在夢幻者麼卓拄杖云今日為君親指出普天匝地盡光明上堂一二二三子平目復仰視兩口一無舌此是吾宗旨仰山大師生平家活徹底為人若以意識度量正所謂平地上死人無數也然此偈無纖毫縫罅博山今日向虛空裏釘橛子太清中加彩繪使諸人有所趣向有所捫摸也一二二三子抖擻不下平目復仰視北斗向南看兩口一無舌空谷傳聲虛堂習聽此是吾宗旨披拂有餘恨諸昆仲當知此偈暗機圓合金鐘同玉磬和鳴正按全提瑞草與瓊枝並茂若向這裏會去平常心與道相宜若向這裏不會正是業識茫茫無本可據更有一事在佛殿東南缺了一角有人補湊得下博山遺隻履以謝之珍重上堂諸佛祕密藏祖師遞相付既同本來心何迷復何悟言語悉虛妄形色如朝露了形色語言究竟絶依怙譬如洞庭水今古清如故虛空非動搖太清絶點污有物終敗壞無形始清素諸昆仲迷鏡裏之頭徒勞狂怖昧衣中之寶枉受伶俜卓拄杖云若向這裏會去猶較些子更欲遲疑向下文長留待來日擲拄杖下座上堂心同虛空界示等虛空法證得虛空時無是無非法大小祖師雖則是和泥合水要且弄巧成拙將心與虛空分作兩橛説同説等論是論非雖不涉是非亦將是非弄影耳夫虛心獨運妙湛何依至體彌綸空界何立大方莫比其量慧目罔眺其蹤日月未足喻其明冰雪難以方其潔古澗之水湛湛浸殺法身不萌之草茸茸能藏香象諸昆仲且道徹底無依向甚處安身立命良久云衆既知時節吾今不再三卓拄杖下座上堂靈光不昧萬古徽猷入此門來莫存知解諸昆仲終日拈香擇火待客迎賓動轉施為折旋俯仰還有知解也無既無知解得恁麼伶俐得恁麼活潑古德云樵子負薪歸機婦連霄織看他家事忙且道承誰力若向這裏會去飯是米做底湯是水做底師姑是女人做底切莫當面錯過不錯過鷂子過新羅依然辜負我卓拄杖下座解制上堂世界乾城衆生陽焰諸佛鏡像六道空花不躋圓覺大伽藍終是癡狂門外走若帶些些泥未免紙褁麻纏除是鐵膽銅心始解步空捉影百尺竿頭穩坐終落那邊三家村裏安身仍停此岸只須藏身處沒蹤迹金針繡出玉麒麟沒蹤迹處莫藏身鐵掌挪成銀彈子諸昆仲今日解制之辰三年果滿萬行周圓且道百步穿揚一箭作麼生透得過良久卓拄杖云好手手中誇好手紅心心裏紅心下座結制上堂世尊拈花芙蓉秋露冷迦葉微笑蘭蕙曉風清又云我有正法眼藏涅槃妙心付囑於汝可謂囊藏長者券腰沒半文錢至今後代兒孫望影分波竟莫得其涯岸當此時也去聖時遙人心狂悖妄庸邪見布滿寰宇稱悟道者紛紛求其真參實究者蓋鮮也諸昆仲若要會世尊拈花底道理豎起拂子云向這裏會取若要會迦葉微笑底道理擲下拂子云向這裏會取然須從冰山雪洞裏穿下過來始堪共語不然則就窩子裏打將去盡是掠虛漢與自己本分中有何交涉即今乃結制之辰有吉安純初曾居士舟次一月而來為彼乃郎廣修供養復請博山上堂敷演此事不免翻世尊之陳案燃古佛之慧燈踵列祖之芳塵續金剛之慧命然雖如是諸人分上也須向無陰陽地上銜一莖草來始得卓拄杖下座上堂單明向上語絶周遮洞鑒機微要在句外若在文言上理會正所謂埋沒先宗辜負自己德山大師云毫釐繫念三途業因諸昆仲十二時中折旋俯仰是繫念耶非繫念耶是正因耶是業因耶又云瞥爾情生萬劫羈鎖開口動舌處是情生耶非情生耶是解脫耶是羈鎖耶汝等諸人各向衲衣下緇素看若以無念為無念無情為無情即泥塑木雕若以有念為有念有情為有情正是業識茫茫無本可據衲僧家須另行一路始得祖師云心隨萬境轉轉處實能幽隨流認得性無喜亦無憂于諸境緣未免隨流且道喚甚麼作性若認得性正好喫博山痛棒若認不得性正好喫博山痛棒何以故龍門無宿客雨打石人頭卓拄杖下座壽日上堂諸佛時常説法博山特地重宣是何言丫角女子鬢皓然是何法明察秋毫雙眼瞎此情惟有木人知六月炎天生凍殺若向這裏揭山頭之宿霧破水面之印文古佛向汝諸人面前説壽量品報恩品已竟所以云博山生大地衆生與博山同生博山壽大地衆生與博山同壽然雖如是更須知有出世事始是報恩者博山嘗有偈云欲報深恩出世奇報恩深處少人知而今洞徹無違理始信從前步不移古德云盡大地如粟米大拋向汝諸人面前諸人要且不會打鼓普請看若會得恁麼説話始知不移步底道理國恩佛恩親恩檀越恩一時報足若乃暖衾涼枕菽水承歡欲報深恩無有是處所以釋迦大師棄皇宮如脫敝屣乃至忉利天為母説法此釋迦之孝也目犍連尊者去鬚髮如除垢膩乃至餓鬼道中救脫母難此目連之孝也現前大衆思地獄苦發菩提心長連床上瞪眉努目究衲衣下一件大事此諸昆仲之孝也作麼生是博山底孝拈拄杖云一條拄杖活如龍縱橫全得渠儂力連卓拄杖下座除日上堂殘冬已去春風到來木雞報曉石女懷胎庭前翠柏堪剪溪邊嫩柳重栽達磨不來東土寒山元在天台惟有臨濟大師赤肉團上無位真人分身無量散在汝諸人面門出入未證據者看看飢同餐渴同飲寒同火睡同衾若向這裏儱侗瞌睡未免受無位真人當面熱瞞豎起拂子云諸昆仲會麼圓明了知不因心念珍重上堂佛法非非法非非非亦非非非俱絶迹始可話離微諸昆仲若欲決擇是非除是向教乘中辨得清濁然後始透得祖師關捩何謂清濁如教中説貪嗔癡愛煩惱無明是障道法此是聲聞藏説是濁流邊説無佛可成無生可度情與無情性相平等此是菩薩藏説是清流邊説至體無名聖功獨照此是藥言無病人前不得説藥有修有證建立因果此是聲聞藏説是濁流邊説無修無證不昧因果此是菩薩藏説是清流邊説修與無修二俱剩語此是藥言無病人前不得説藥若説有句無句是外道説若説亦有亦無句非有非無句亦是外道説離四句絶百非此是藥言無病人前不得説藥若貪著塵勞侵損正法此是波旬説失于正受樂著諸受此亦是波旬説山崩海竭不動其心此是藥言無病人前不得説藥諸昆仲百非俱遣宛然赤子之心一道齊平突出摩醯之眼珍重上堂壽昌先師云踏上雲頭第一峰眼中廣博小虛空當初欲見無繇見今日相逢處處同諸昆仲此是曹洞宗旨分明向汝諸人道無纖毫蓋覆若向這裏會去洞山大師在諸人腳跟下放光動地入寶鏡三昧也其或未然博山不免注解一遍踏上雲頭第一峰坑坎嶮巇也須仔細眼中廣博小虛空眼在虛空裏虛空在眼裏試定當看當初欲見無繇見對面不相識千里卻同風今日相逢處處同是何面目指東為西喚南作北得麼若向博山注解處會去壽昌先師在汝諸人腳跟下放光動地入寶鏡三昧也然雖如是博山不合將壽昌老人受用底家私撒向諸人腳跟下豈不見父為子隱子為父隱直在其中矣珍重桐城宰官居士請上堂拈香祝聖竟復云諸昆仲參學須具參學眼若具參學眼腳踏實地步步登玄若不具參學眼與參學沒交涉譬如善射者立定腳跟然後拈弓架箭始能中的也黃蘗希運禪師云老僧行腳時見草裏有人攔頭一錐彼人若知痛癢便布袋盛米供養他雪峰大師三登投子九上洞山炊飯挪巾成辦箇專此宗門中參學樣子不似而今口稱行腳觀山玩水較量是非三三五五聚頭雜話有一等向册子上研窮枯骨上討汁有一等長連床上睜眉努目胡思亂想想久成勞不是昏沉便是散亂如斯等類皆非法器諸昆仲洞房春暖須知錦帳香銷庭際光生且喜寒巖發焰事驚極致理喜從虛所以道直須揮劍若不揮劍漁父棲巢間時喜唱步虛詞泥雨須防苔蘚滑路憑高處險獅巖絶狐狸之蹤影向暗中消靈運結燈花之彩諸昆仲博山捨父逃走伶俜辛苦三十餘年今日到舒州城唱箇還鄉曲子徹見故鄉田地徹見故鄉人物徹見故鄉春色世間之樂百千萬億倍不足為喻茲因桐城衆宰官居士及諸山僧友請博山升座説法博山果有何法可説不免將生平所行底所見底所到底細詳一遍然雖如是道曠無涯逢人不盡更須知有長處始得卓拄杖云莫謂故鄉田地穩門前更有萬重山僧問此土聖凡同聚會向上宗乘為舉揚師云此去南舒一百餘又問不問有言不問無言請和尚如何道師云巖前生石虎僧喝一聲師笑云聲響吼如雷僧無語師便打生生社升座拄杖子謂之有是增益謗謂之無是減損謗謂之亦有亦無是相違謗謂之非有非無是戲論謗只須向四句外會去始不被拄杖子瞞諸昆仲緣生無性拄杖子徹底無依無性緣生拄杖子建立世界拄杖子緣生一切法緣生拄杖子無性一切法寂爾所以道心生種種法生心滅種種法滅祖師云百千法門同歸方寸恆沙妙德總在心源會此一心法説生無生亦得説無生生亦得説生生無生亦得説無生生生亦得繇此運大悲心興放生業飛者適虛空走者適林麓潛者適淵溟豈可以世間生滅有無而較量其功德者哉博山今日登此座筵不説有法不説無法不説亦有亦無法不説非有非無法離四句絶百非石人點額青山皺眉深寒博得三春暖破霧披雲入翠微諸昆仲南山起雲北山下雨汝等諸人緊捎草鞋牢把腳跟然雖如是爛泥田埂石頭路上也須防卓拄杖下座生生社小參諸昆仲宗門中事難以措詞盡力道不得句作麼生開口三乘十二分教有人説去了也即心即佛有人説去了也非心非佛有人説去了也不是心不是佛不是物亦有人説去了也且道現前與諸昆仲分析底是箇甚麼若喚作業識茫茫正所謂懷寶迷邦若喚作直下是佛因甚麼承當不下昔世尊拈花示衆百萬人天悉皆罔措惟迦葉一人破顏微笑且道迦葉笑個甚麼博山不免為諸人注破若向世尊拈花處會去山濤海雲為汝等助發機緣若向迦葉微笑處會去飛走鱗毛普現色身三昧到恁麼田地不作箇解會亦非無解會者雲門大師云古佛與露柱相交是第幾機且道現前喚甚麼作古佛喚甚麼作露柱又自代云南山起雲北山下雨且道雲門意在於何若向雲門句下徹去會此分折底有甚麼難然雖如是黃金自有黃金價切莫和沙賣與人珍重皖城宰官居士請上堂天地與我同根萬物與我一體肇法師恁麼道秪知全身拶入要且不會轉位旋機殊不知大圓覺中無我無人無衆生無壽者説箇一體已成兩橛豈不見喚作如如早是變易了也僧問大隨和尚劫火洞然大千俱壞未審這箇還壞不壞隨云壞這僧倚牆靠壁冷地裏抱箇石頭大隨兵權在手符到奉行又何曾放過道個壞字正所謂殺人不眨眼僧云恁麼則隨他去隋云隨他去大隋把定關鑰添枷著杻兩重公案這僧徑往舒州見投子子云甚麼處來僧舉前話子裝香望大隋拜云大隋古佛放光于此投子可謂具金剛正眼緇素分明復令這僧向大隋懺悔僧至大隋隋已遷化復往舒州見投子子亦遷化這僧雖然皮下無血要且有始有終後人贊云一句隨他去迢迢幾萬餘今時人坐參知識尚不肯真參力究見這僧也須知慚愧始得茲因合郡宰官居士於彌勒菴請博山登座説法諸昆仲當知古佛堂前曾無異説夜明廉外別有家傳分明月照金沙喜見庭生瑞草家風笑展從他野渡無人寶樹風清須信白雲有主諸昆仲若向這裏會去可以與古人把手入理深談其或未然生死分中快須著力卓拄杖下座展墓歸山上堂離山九十日誰是能離者本無心外境愚者妄分別諸昆仲會得此意雖經歷恆河沙世界無彼此之分無自他之想良以世人秪知有一生身及一生底父母一生身底處所殊不知曠大劫來能生所生底父母及一一生身底處所盡其智力不得其數量諸昆仲若以恩報恩大恩莫能報不見報恩者始乃得常住是故諸菩薩借此世間孝運無緣之慈興無礙之悲耳諸昆仲金棺扶認父骨於亂尸之中義井薦親見天人于寶塔之頂此等俱見超物表理出常情若以世間情想擬報深恩雖肝膽塗地不能報也昔興化令他人助哀山河揮淚迦葉藉琴聲起舞草木含悲博山今日以現前血肉身心供養現前無面目底父母汝等諸人向這裏還見得徹麼卓拄杖云他家自有通人愛不以親疏較短長便下座為官諭吳觀我居士茶話真不掩偽曲不藏直大千沙界黑如漆揭開雲霧見青天男兒肯向他尋覓一語中具三玄新婦騎驢阿家牽一玄中具三要跛腳猢猻多躑跳有照有用沙盆打著連底凍立主立賓相將攜手過西秦唯有東村王太乙一番拈弄一番新今日為太史茶話要向博山言句下一一討箇注解其或未然三十棒寄在別來相見珍重二月朔旦上堂才方結制又是半月了也諸昆仲分上曾有個入處也無若無箇入處須要尋個入處若得個入處須要尋個出處直須自看諸昆仲當知古路無塵只須知有門庭絶待盡卻今時偏方與正位攸同枝派共靈源皎潔到此則髑髏識盡烈火流金始名出世更須知有野老家風始得且道野老家風是何景象卓拄杖云遲日穿芳徑春鋤帶雨歸下座上堂僧問古人道從緣薦得相應疾就體消停得力遲請問如何是從緣薦得師云古鏡不重磨進云如何是就體消停師云清光仍似舊進云從緣就體蒙師指格外玄談有也無師云三歲孩兒頭似雪進云恁麼則碧桃綻蕊緑柳萌芽也師云遠觀山有色近聽水無聲僧禮拜師乃云切忌從他覓迢迢與我疏洞山老人草鞋斷矣腳跟露矣諸人若知痛癢阿誰皮下無血博山與諸人同途不同轍諸人向正位中來博山不在正位諸人在博山拂子裏許諸人向偏位中來博山不在偏位拂子在諸人袈裟裏許所以道對面不相識千里卻同風若向這裏徹去當下知歸不留朕兆其或未然千百世修行未為晚也故我釋迦大師為勇猛衆生成佛在一念頃為懈怠衆生得果滿僧祗劫諸昆仲當知明中有暗毫端現華藏之奇妙挾協通寶鏡瀉山河之影博山恁麼道猶是葛藤諸人也須拼斷始得且道拼斷後作麼生行履卓拄杖云不因樵子徑爭到葛洪家結制上堂僧問古人道塵中能作主化外自來賓請問如何是塵中主師云江西原是豫章城進云如何是化外賓師云青山自青山進云賓主相見時如何師云緑水欣緑水進云恁麼則金繩界畔飄黃葉般若堂前解垢衣一句作麼生道師云順數一籌進云博山今日結制人人鼻孔撩天請問更與諸人説箇甚麼師云空中施彩繪論劫不成顏僧禮拜師乃云便恁麼進堂去猶較些子更欲遲疑劍去久矣博山從來無佛法繫綴於人豈但博山乃至諸佛諸祖亦復如是但有言説都無實義所以道釋迦不達南方禪達磨不會西來意博山與諸人秪知二時逐隊但恁麼過時臨濟三玄三要誑嚇小兒曹洞兼帶協通顢頇無識溈仰暗機圓合鬼面神頭雲門函蓋乾坤心粗膽大法眼雖云平易機險殺人博山總不恁麼今日與諸昆仲結制將九十日為一時以一時為九十日若向這裏會去萬年一念一念萬年生死情枯真如體寂二途俱泯觸處皆通茲有嘉興沈居士不辭數千里來此供養大衆且道作麼生説個通底道理卓拄杖云根塵蘊界原無性誰道虛空礙眼睛上堂摶聚四大緣生九竅識蘊奔馳何日了虛空無限水雲分石女從緑步荒草荒草披離四部洲煙雲旋合鎖重樓彈指豁開彌勒閣香水幡幢盡徹頭諸昆仲當此時洞庭無蓋凍殺法身廬阜悲酸清淚如雨欲償廬陵米價踏翻東兗橋梁從教雪潔水清管取兒孫滿地到恁麼田地以何為驗卓拄杖云深山乘瑞運處處紫雲飛
