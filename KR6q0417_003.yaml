body:
  text: 首座成正録大仰寶林寺語録結制上堂諸佛出世為一大事因緣幾幅素縑描不出博山出世亦為一大事因緣一條白練驀頭穿破顏老漢曾相委多少人天受熱瞞博山今日不免信手拈來分明舉似使人人鼻孔撩天個個腳跟點地迥出毗盧之頂笑拈帝釋之花推倒大好之山吸盡西江之水如此奇特誰不丈夫自貴擔荷誠難委綰諸昆仲此事不從功行得不從修證得不從思議得不從學分得有一等人閉門作活暗裏休心將自己身心鍊得如枯木寒灰蟲唼衣而不知蛛結網而不顧縱是百年在定終如一個死人於本分事中全無交涉所以玄沙大師云直饒如澄潭月影靜夜鐘聲隨扣擊以無虧觸波瀾而不散此猶是生死岸頭事諸昆仲須就明中取則莫於暗裏偷光向花柳街頭逴得九衢春色於芙蓉岸上帶來八面秋風應用無虧隨緣自在諸昆仲且道作麼生是博山行履處良久云秪有一雙窮相手不曾輕揖等間人上堂心不是佛智不是道智盡無知無知知要博山晝起暗眠算來恰恰卻好對談無論是和非三寸舌頭胡亂掃有問禪夜深明月照窗前有問道無角泥牛臥荒草有問法南嶽石頭苔路滑有問僧眼中瞳子面前人更有當陽向上句分明説與君須記從來孝子諱爺名等間拈出同兒戲諸昆仲博山今日拈出可謂不惜家珍也秪要諸人領略不然則辜負大衆去也復笑云不辜負剩栽無影樹留與後人看上堂佛法有因緣因緣非佛法彼此不相涉蓮花從口發昔釋迦大師托質閻浮降神兜率未受羯藍之孕便展無礙之鋒現世界而無邊化衆生而無量簡點將來要且不曾度著一個既出母胎捨皇宮之快樂受雪嶺之飢寒睹明星而悟真常即塵勞而成佛事要且不曾悟著一法及乎開場四十九年談經三百餘會龍宮塞滿而法界全彰要且不曾談著一字逮末後拈花示衆便云有教外別傳説印心之妙偈付上行之金襴要且不曾傳著一絲及乎三千七百承虛接響人人拖泥帶水而棒喝交馳各各帶水拖泥而眉毛倒豎要且不曾沾著一滴今日博山遠承慈蔭雖是他家兒孫要且不行他故轍是佛亦鏟域內不留朕兆是魔亦鏟緣中豈涉塵勞是僧亦鏟拂羅漢之我人是法亦鏟出智眼之金屑當此法筵之際向蒼煙紫霧之中細觀豹變於流沙絶域之外捷見飛黃直下舉向上機徹頭示末後句諸昆仲既是直下喚甚麼作向上機既是徹頭因甚是末後句復笑云金背黃牛眠緑草銀蹄黑犬吠青天上堂心本是佛智本是道認奴作郎終成不肖東寺要索鎮海珠仰山傾出一栲栳釋迦彌勒為渠忙帶纍博山渾落草不落草萬里山河明杲杲西湖水浸碧琉璃南海波斯無處討諸昆仲當此時也秋日微微秋菊離離秋雁南飛秋猿夜啼古所謂欲知佛法當觀時節因緣今時節至矣作麼生是本成佛的心以手約云看看傍觀者哂當局者迷參上堂昨日是重陽今朝不見九惟有破落僧面南看北斗懶烹石女茶酷愛曹山酒棒打石頭人不落瞿曇後諸昆仲通玄一脈智者知疏不動金鞭白牛迥野擬向溪東牧不免食他國王水草渾家不著孝撲碎玉琉璃擬向溪西牧不免食他國王水草罷拈金彈子大地沒間人不如隨分納些些秋風多帶殺秋露逼人寒諸昆仲更須知人牛不見海湛空澄涓滴非聲千山不露恁麼時節轉位就機一句作麼生道堪笑陶彭澤無錢對菊花上堂雲居祐禪師云月色和雲白松聲帶露寒好個真消息憑君仔細看諸昆仲此四句偈如啞子作通事分明舉似於人秪要披襟領荷博山今年到寶林寺恰恰應這個時節不免注解一遍與大衆結個出世大因緣也月色和雲白人居翠蓋東更求親切句欸乃月明中松聲帶露寒冷落絶躋攀渾身赤骨歷坐破蘚苔斑好個真消息全歸顧盻中夜深人盡曉清碧許誰同憑君仔細看當下骨毛寒攜笻深嶂裏趺坐聽綿蠻諸昆仲且道博山注解還徹古人意否一聲鐵笛歸來晚笑展家風爛熳看上堂説一個禪字好與三十棒杖頭有眼明如日説一箇法字好與三十棒優鉢無根滿樹花説一個佛字好與三十棒分付老盧高著眼説一個僧字好與三十棒莫教流落在天涯過得瀟湘渡口便知清白人家管甚煙雲埋沒從教黑豆生芽翻思昔日雲門老卸卻鐵枷真個好一棒打殺貴太平免使兒孫落荒草諸昆仲開眼説夢醒亦是迷白酒青鹽我乃是誰寒冰烈火痛下針錐今古幾多伶俐漢分明辜負一雙眉復笑云博山罪過上堂我有一句子當下絶羅籠遇險收雙足登山跨遠峰雲凝天欲曉雷震鳥潛蹤瑞草和根拔曇花徹蒂紅三玄稱絶唱九帶應奇逢淡淡澄江漢啾啾較蠛蠓不吐南山霧何妨八面風兔角情方瞥龜毛意轉濃拈香添社火擇菜挫來鋒石女頻加額木人幸斂容頗厭堆山富還期徹骨窮倒騎折足馬踏碎玉屏風諸昆仲此句乃宗門中肯綮之談博山今日盡情吐露若要會此偈意從水晶宮裏穿下過來打破琉璃瓶子然後向十字街頭與博山相見更有話在上堂諸法不自生高樓石女夜吹笙亦不從他生展似眉毛作麼生不共不無因青山隱隱碧稜層是故説無生漫江水浸石頭城幾多獵犬尋羊迹誰知一馬生三寅髫齔喜從城下看暮年不見白頭人黃菊落英秋又過不知誰會憑欄情識盡髑髏聽犬吠銷乾枯木喜龍吟諸昆仲更有三玄與三要鐵膽銅心無處討吸乾滄海露出珊瑚枝沖開碧落不顧無根草諸昆仲不許夜行投明須到上堂世尊拈花久晴雨也迦葉微笑久雨晴也航海西來衣線綻也斷臂酬心骨髓露也瘋顛求懺罪性空也倩人書偈本無物也南嶽磨磚牛非駕也馬祖一喝雄峰震也三日耳聾聰無敵也踢倒淨瓶世界傾也三遭痛棒杖開眼也卸卻鐵枷腳脛斷也過水拶著渠是我也睹影大悟我非渠也迤邐行腳知親切也博山大似不肖兒孫簡點祖宗過失今日不免翻案做個克家子將七珍八寶收拾在一處然後跨白牛而坐斷十虛乘清風而遊乎八極斫盡青松驚起千年白鶴高登碧嶂踏翻幾片間雲然雖如是更須知博山野牧樵情始到大安樂處不然只饒聖處受生未免竿頭險墮上堂旃檀叢林旃檀圍繞既披龍樹影不問鄧林材荊棘叢林荊棘圍繞鵠鴻雖有志安識海雲低荊棘叢林旃檀圍繞客來雖不待應物善知時旃檀叢林荊棘圍繞高樓聲漸細移月過滄洲古人指出此四種叢林敢問諸上座畢竟在那一種叢林安身立命博山曾一一穿過今與大衆開幾重關鎖要入之者不可儱侗善而擇之若説旃檀叢林穿過荊棘叢林幾點翠封階下石數行雁過楚天秋若説荊棘叢林穿過旃檀叢林不因樵子徑怎到葛洪家若説旃檀叢林不是荊棘叢林荊棘叢林不是旃檀叢林竹風與薰蘭分香松影適茶煙異色若説旃檀叢林即是荊棘叢林荊棘叢林即是旃檀叢林水中擇乳須是鵝王敢問諸昆仲博山即今在那一種叢林良久云野老不知菴外事殷勤只向佛前燈便下座上堂達磨不虛傳二祖不虛受碧眼胡僧皺兩眉看來不著隨人後密究深裁全火祗候龍隱長空雞鳴白晝諸昆仲當知魚遊陸地笑殺陝府鐵牛虎踞衝衢驚倒嘉州大像法界撮來一粒太山只重三斤到此則罷扳雲樹懶聽風柯飲啄隨緣無循軌度有時在太陽門下而玄唱玄提有時在明月堂前而分斤分兩有時在芳草波心澡浴而手拆青蓮有時在紫羅帳裏謳歌而針環玉線諸昆仲縱有歡客嘉賓向甚麼處與博山相見良久云前村煙浪裏犬吠有人家上堂春雨淋不去瓊花生碓嘴夏日曬不乾深陰淨如洗秋月頗相宜澄潭不見底冬雪凍法身飄飄千萬里四季共一年循環差可擬寒暑不同時彼此非相似恁麼也不得黃河水倒流不恁麼也不得虛空生兩耳恁麼不恁麼總不得燒火拾枯柴遊山觀止水恁麼也得買石得雲饒不恁麼也得移花兼蝶至恁麼不恁麼總得碧沼間紅蕖清風翻白羽諸昆仲以字不成八字不是是甚麼字以手畫一圓相云白牛放去無蹤迹空把山童贈鐵鞭上堂古鏡闊一丈世界闊一丈世界闊一丈火爐闊一丈火爐闊一丈法座闊一丈法座闊一丈髑髏闊一丈髑髏闊一丈眼睛闊一丈如何是古鏡隱顯幾微無欠剩如何是世界拈來擲去椰子大如何是火爐深撥寒灰有點無如何是法座坐談誰管天花墮如何是髑髏趙州東壁挂葫蘆如何是眼睛團圞光瑩若銅鈴諸昆仲今朝初一明日十五雪峰拋毬禾山打鼓大家齊賀太平年聾者聾兮瞽者瞽惟有窗前白兔兒帶角鑽歸三尺土咄下座上堂天不蓋地不載逢貴買遇賤賣進前才索商量漆桶依然不快諸昆仲須是全身拶入徹底翻開大唐國裏沒禪師沸鐵洋銅難下口今有一事問汝諸人水底石頭顛倒走雲中泥雁往來飛這箇若是即頭上安頭如汝文殊更有文殊是文殊者這個不是即斬頭求活如一月真其中更無是月非月目前無法意在目前見見之時見非是見見猶離見見不能及不是目前法非耳目之所到斫卻月中桂清光應更多諸昆仲諸方將宗注教博山將教注宗還有優劣也無注則注矣破則破矣且道夾山意在甚麼處好鳥盡從林下過鳳凰不戀舊時巢上堂一法若有毗盧墮在凡夫富嫌千口少萬法若無普賢失其境界貧恨一身多泰山與華嶽爭衡少室共雄峰側耳腹藏四大海腳踏須彌盧於金輪際下探不二之真源向香積界中搏無殊之法食此猶是門庭施設小不思議衲僧分中了無交涉諸昆仲須知法外無身心外無境智外無土空外無塵纖芥方投千門洞達一塵才起大地全收結菴摩羅果於不思議之鄉植旃檀陀林於無陰陽之地且道古今阿誰得恁麼受用惟有傅大士較些子君不見山海坦然平敲冰來煮茶惜乎此老早矣未曾得見博山若見博山好與痛棒還是賞伊罰伊要渠識痛癢始得諸昆仲此事不要與列位公子得知若知時將謂佛法容易也然雖如是且道那個皮下無血珍重上堂居一切時不起妄念月中丹桂和根拔海底泥牛驀鼻穿於諸妄心亦不息滅紅塵堆裏排班立白浪灘頭撒手行住妄想境不加了知臘月火燒無影樹三春人唱採樵歌於無了知不辨真實須彌頂上花冠子非是人工蘊造來諸昆仲博山有不思議的爐鞴將佛祖言教煉成一個鐵橛子針劄不入水灑不濕若喚作教卻又是禪若喚作禪卻又是教直饒於禪教中分別不生更須知禪教向上有事在且道作麼生是向上事玄都觀裏桃千樹盡是劉郎去後栽鼓山語録開堂拈香白椎竟師曰昔日世尊在靈山會上拈花示衆尚餘一枝在博山手裏今日于湧泉堂上供養大衆去也古德云昨日作嬰孩今朝年已老未明三八九難踏古皇道恁麼説話披心瀝膽徹底婆心且道作麼生説個三八九底道理卓拄杖云黃河水溢黃河水雲霧山連雲霧山珍重結制上堂三百年前諸尊宿在此一片地上東語西話三百年後博山在此一片地上東語西話雖則依模畫樣大似捕空捉影劈水尋蹤簡點將來不無滲漏雖然如是彼一時也此一時也諸昆仲若知得彼時即此時不見有三百年前此時即彼時不見有三百年後所以道一念普觀無量劫無去無來亦無住此猶是教家事更須知有宗門下長處始得且道如何是宗門下長處卓拄杖云朔風凜烈吹開寒谷之花石火輝煌拍破木人之掌珍重上堂春日乍寒乍暖春風倏有倏無若從這裏會去佛法天地懸殊不從這裏會去向甚麼處會才涉思惟成群作隊不思惟處意如何行人更在青山外今日博山親歷其境有一首偈分明舉似大衆偈曰三腳驢子弄蹄行踏破蒼苔知幾層正恁麼時誰會意白雲深處坐禪僧卓拄杖云咦誰是其人珍重上堂舉拂子云有物先天地無形本寂寥能為萬象主不逐四時凋古人恁麼道獨步全提至微至著超規越矩方圓可成先賢朱晦翁嘗以此偈示門人曰吾儒無此等語晦翁可謂知言也諸人還知麼月渚風林流出現成公案鶯聲鳥語宣揚不二法門雲中之木馬長嘶山外之泥牛倒走毋居正位不犯當頭坐斷十方不通凡聖然雖如是更須知有向上一縫子始得且道如何是向上一縫子良久云口是禍門上堂天地旋山河走面南辰看北斗家鄉田地謾商量肉髻明珠誰不有諸昆仲論肉髻之明珠貴在親知論家鄉之田地貴在親到親知則取之不竭用之無窮親到則春耕秋穫布種以時果得如是受用譬如擲劍揮空毋論及與不及此等説話大似嚼飯餧嬰兒諸人分上因甚麼不薦卓拄杖云只為分明極翻令所得遲上堂黑狗爛銀蹄白日通霄吠石女倒拈針木人相對語諸昆仲于此四句上透得過四方八面來虛空連架打所以道一雙孤雁貼地高飛兩個鴛鴦池邊獨立可謂明珠在握寶鏡當臺胡漢俱來隱諱不得諸昆仲團大千于掌上擲化土于他方探香水于金輪果能如是也儘奇特但切不得動著動著則打折汝等驢腰卓拄杖下座上堂卓拄杖云轉山河歸自己月明當戶照轉自己歸山河風冷厭山居撞鐘撞著老僧心祥雲從地起鐘聲為甚麼披七條衣寶蓋自天垂總不恁麼道又作麼生不是家鄉客徒勞話歲寒此五種見地雖則賞罰分明也要諸人委悉有一人在蘊界屏處説非法語犯十三僧伽婆尸沙有一人在淨白地上涕唾犯一百應當學有一人撥草瞻風攙行奪市有一人露盤卓解作家方有一人針劄不見血火燒不知痛病在膏肓不堪療治若有人于此簡點得出博山分付拄杖子一任天下橫行其或未然卓拄杖云楖栗橫擔不顧人直入千峰萬峰去金陵天界寺語録金剛殿拈香三門高聳臨霄漢廓爾方知祖道玄今日腳跟親踏著優曇花影遍三千天王殿拈香從來願力展慈威爍破虛空毫相輝依正報中誰辨得山頭多見紫雲飛大雄殿拈香黃金殿上三尊佛白玉光中一箇僧正恁麼時何所據香雲旋結萬千層振宗堂據座寶鏡當臺驗正邪阿誰獨蹈大方家博山手段從來辣客到蒿湯便當茶開堂此一瓣香彌天亙地耀古輝今太極鍾祥乾元衍慶爇向爐中端為供養我明太祖高皇帝成祖文皇帝建立三寶弘通大乘廣化衆生同圓聖智山僧某今日在此法筵一言一句皆從聖恩中流出以海水為墨書其贊辭不能盡其萬一也伏願皇極御天遍大千而廣被聖靈奕世昭萬古以常明此一瓣香靈苗含潤寶樹敷榮景星聚以沐清庥祥雲凝而乘嘉運爇向爐中端為祝延當今皇帝聖壽萬安皇后偕聖壽以無疆太子懋元良而永泰伏願金輪永鎮日新鷲嶺之風寶位增輝時邁唐虞之治此一瓣香萬物育以生成陰陽協而秀發為霖現瑞裕國祐民爇向爐中用酬檀護滿朝合郡宰官護法大居士福基祿位咸增性種靈根並茂此一瓣香龍宮湧出鷲嶺拈來輝寶鏡而利益群生徹重玄而全該正命爇向爐中專申供養先本師壽昌大和尚用酬法乳之恩師斂衣就座白椎竟師卓拄杖云諸昆仲達磨大師航海而來直指人心見性成佛雖則門庭萬仞壁立千層秪演一心之法更無餘事乃至六祖傳衣五宗競出運無礙輪化無緣衆秪演一心之法更無餘事溈山大師敲唱同時暗機圓合傾瓶以辨超方撼茶而彰妙用秪演一心之法更無餘事雲門大師箭鋒相拄函蓋乾坤揚眉落臼顧盻猶遲如流雲翔鶴湛水晴空秪演一心之法更無餘事法眼大師拈現前石塞虛空口一切處現成六根互用六用齊施秪演一心之法更無餘事臨濟大師一語中具三玄一玄中具三要驅耕夫牛奪機人食電光石火開眼猶迷秪演一心之法更無餘事洞山大師混不得類不齊立寶鏡三昧照學者肺肝分五湖玉石雪盛銀碗月照金沙秪演一心之法更無餘事乃至博山今日遠承諸祖慈蔭循規蹈矩借路還家駕輕就熟秪演一心之法更無餘事諸昆仲含靈具此一心之法學人欲明此一心之法三世諸佛歷代祖師示此一心之法故楞伽經云佛語心為宗無門為法門諸昆仲大地沒遮攔要行行不去要住住不得且道向甚麼處出氣還知麼鳥鳴雲樹聲聲喚遊子歸家魚躍煙波色色翻志公陳案漩澓空中梵字刮開眼底重朦且道向甚麼處認取自家心地卓拄杖云鼻根浮面上更不用躊蹰珍重當晚小參南嶽大師云一切萬法皆從心生心無所生法無能住若達心地所作無礙諸昆仲心無所生山河大地從甚麼處得來法無能住終日著衣喫飯因甚麼只認定著個自己去此二途作麼生折合諸人分上也須自看有人通得消息博山將袈裟以覆之茶話若論參學分中事當下教諸人領略去當下無事去早是埋沒諸人了也其中有二種岐路一種學人擔佛傍家走乃至求佛求法求禪求道求玄求妙等隨處擔一擔子通身都是佛法如龜負圖自取喪身之兆鳳縈金網趨霄漢以何期又有一種學人自作主宰謂有甚佛可求甚禪可參甚道可學只剝得淨潔無依謂是自己受用其實未到淨潔處皆是業識心生出此等邪見只饒到淨潔處未許有參學分在諸昆仲若起世間貪嗔癡罪雖重猶輕若將淨潔處謂之參學極則此業最重世間無有與等者諸昆仲直須掀翻此二種邪見且道向甚麼處討箇安樂古德云如何是頭只須知有果是知有不愁不盡卻今時也從上諸祖推此一事最妙最玄如荎草味如金剛杵若向這裏開眼方許有説話分今晚為三方丈茶筵中吐露個消息大衆作麼生理會若就此言句中透脫也不難其或未然各自喫茶歸堂去好上堂洞山大師悟道偈云切忌從他覓迢迢與我疏我今獨自往處處得逢渠渠今正是我我今不是渠若能如是會方得契如如此是洞山宗旨綿密回互皆從此偈中流出不可不理會諸昆仲此偈中有二句最嚴渠今正是我我今不是渠渠者何物也而正是我我者復何物也而不是渠且道是一個是兩個若向這裏會去始可有參學分須知此偈豈但曹洞宗旨即五家應機接物皆當向此句中印過始得不然在一機一境上得些子解路盡是掠虛頭漢有甚麼話會處所以曹洞有三種滲漏一者見滲漏機不離位墮在毒海此不離即毒海也二者情滲漏智存向背見處偏枯此向背即偏枯也三者語滲漏體妙失宗機昧終始此體妙即機昧也若據此三種滲漏學者明晦如見肺肝所以博山舉眼無人非敢以生滅勘驗諸方若見徹此偈洞山大師未曾入滅博山雖在今時亦不諳今時事秪與諸人二時逐隊諸昆仲古木叢中躑躅漏逗法身大洋海底翻騰清損漁父徹見本來面目野雲散而天青掀開煩熱胸襟衣線綻而體露還有與洞山大師共出一隻手者麼卓拄杖云舉頭天外看誰似我般人上堂如何是佛十方世界最靈物如何是法古路迢迢苔路滑仍將佛法問根源雲散長空鶴唳天纖塵不立清如洗三個猢猻夜簸錢諸昆仲宗門中事豈同容易一言一句一大藏教注不破歷代祖師機深智廣潛興密運須彌倒卓拄杖橫趨繪彩色於空中擲大千於方外且道向甚麼處捫摸所以云羅籠不肯住呼喚不回頭古聖不安排至今無處所玄沙大師恁麼老婆心切也只要諸人知箇落處始得諸昆仲青黯黯處樵子不借路以還家綿密密時機婦罷金針而夜織香銷錦帳露浥芙蓉發清嘯於深閨吐微言於連枕情濃意洽試問諸昆仲還知得也無良久云分明一段風流事不與諸人較短長小參百千法門無量妙義盡在諸人心意識中悉皆具足汝若認著心意識便昧卻百千法門汝若體會得百千法門何處有心意識來這些子關竅亦能殺人亦能活人諸禪者各各在衣線下開眼拼此一生討個著落上堂南陽忠國師云青蘿夤緣直上寒松之頂白雲淡濘出沒太虛之中萬法本間而人自鬧諸昆仲作麼生説個本間的法若會得本間法則大千世界有情無情等無纖毫鬧相若有纖毫鬧相則不得本間法也何以故鬧即法故所以道靜則埋根千尺動則當處生苗只饒不動不靜未免飄飄搖搖博山則不然動則寒冰凝結靜則白浪滔天直下了無動靜紅爐片雪如綿若於此二偈中會去始明得本間法也諸昆仲動非動相雖動極以恆安靜復靜元總靜機而常運秉常運之樞機履恆安之玄軌寶鏡懸而無隱慝珠簾捲以納方來不涉呼吸之離微寧有去來之蹤迹諸昆仲順則吉也逆則忤也肯則自許也若於靜鬧親疏而較其優劣者盡其恆沙思量分別莫能得其量也卓拄杖下座上堂僧問古德撥塵見佛時如何直須揮劍若不揮劍漁父棲巢又僧問古德撥塵見佛時如何渠無國土何處逢渠二大老各道得一邊一箇則門庭施設輝煌掌上之珠一箇則入理深談擊碎秦時之鏡若是博山則不然有問撥塵見佛時如何紺髮旋螺髻兜綿印手文學人不會意旨如何青蓮捧雙足赤肉挂金禰且道與古人是同是別若説是同作麼生説箇同底道理若説是別作麼生説箇別底道理若向這裏融會得去博山與汝結個同參諸昆仲居正而不立正位泥牛吼海岸之風垂偏而不住偏方石女弄珊瑚之影乞食於三家村裏謳歌於萬仞峰頭借松鏡以瀉清光拾苔錢而嚴富態有人向三種問答上徹去洞上宗風於斯有賴矣珍重茶話不與萬法為侶者是甚麼人紅塵堆裏露全身了知萬法空無物那見山河礙眼睛三歲孩兒頭似雪神光萬里一條鐵底事分明説與知當戶連山也太奇兼帶位中親迸破巖前石虎夜生兒生兒則且置且道是甚麼時辰子丑寅卯辰巳午未申酉戌亥乾三連坤六斷離中虛坎中滿屈指顛倒數來依舊寸長尺短珍重答問僧問斷簡殘篇即不問斬新條令一句請和尚道師曰裂破幾重清世界倒騎玉象趁麒麟進曰此猶是斷簡殘篇師便打進云恁麼則天下太平萬民樂業師曰吸盡南山霧長存北嶺松僧禮拜僧問夾山大師云截斷天下人舌頭即不無爭教無舌人解語敢問和尚如何是無舌人語師舉拂子云會麼進曰此猶是有舌人語畢竟如何是無舌人語師曰白雲彌世界虛空無去留進曰如是則語帶玄而無路舌頭談而不談也師曰汝向甚麼處見老僧進曰中興曹洞之宗除是和尚始得師曰也是間言語僧禮拜僧問古人有言有物先天地未審是什麼物師曰空中書梵字進曰無形本寂寥髑髏邊還有氣息也無師曰撲破不成文進曰能為萬象主未審是同是別師拈拄杖云這箇不可喚作拄杖子進曰不逐四時凋究竟將來相去幾許師云這箇喚作拄杖子始得進曰正當恁麼時普天之下蘭膏繼晷佳景呈祥如何是博山境師云階下苔錢砌就進曰如何是境中人師云鼻梁向下垂僧問釋迦老子四十九年説法正眼看來猶是無風起浪敢問和尚説法還有為人處也無師曰此去江西半月程進云倘遇個六根不具底漢和尚又作麼生師云冰溪水底清如鏡進曰向上還有事也無師云楊子江頭浪潑天進曰恁麼則和尚恩大難酬師曰禮拜了退首座問云適聞和尚高低一顧眼見鼻梁秪如逼塞虛空作麼生轉得身吐得氣師卓拄杖云蹤迹不施功千山添翠色進曰恁麼則撲破虛空通身活眼師曰門前一水收三水屋後千松蓋萬松進曰秪如蕭使君道山河大地渾成夢且道是真夢是浮夢師曰直下看取進云與麼則龜毛拂子春風動拄杖縱橫法界收師曰且放過一籌座禮拜僧問今日壽誕敢問和尚年多少師曰頻添花甲子數到劫雲初進曰秪如和尚未出世時一句又作麼生師曰手中拂子三十錢買來底進曰謝師答話師曰且道劫雲之前是何境象進曰今朝不用重追究曾向湖南佛國來師曰三十棒自領出去僧問如何是無量壽師曰烏龍潭上浪滔天進云恁麼則有量也師曰天池一滴水怎與衆同流僧禮拜茹居士問向上一著如何道師曰石頭城外垂楊柳進云這是衆生眼如何是善知識眼師曰吹盡殘花色愈鮮進云未為奇特師曰居士向下會取進云弟子參學二十年今日學得一拜便禮拜卓居士問諸佛國土亦復皆空畢竟向甚麼處莊嚴淨土師云青龍山上鹿兒肥士無語師云會麼士云不會師云流鶯雖有語天籟聽無人張興公居士問和尚言學人須全身入理乃可問向上事即今請問如何是理師曰橫身當宇宙大地沒遮攔進云如何即得全身入師曰盡力推爺向裏頭進云未全身入者過在甚處師曰珍藏燕石不辨金光進云全身入時以何為驗師曰十方消殞左右逢源進云全身入理後如何師曰跳出千層浪方誇稱意魚陳雲怡文宗問渴鹿趁焰如何得歇師曰知不是水則了問摩尼珠久埋沒塵土中如何急切覓得師曰覓他作麼問一斬一切斷如何得此利劍師云咄誰敢當鋒問等是水味有品為第一泉有品為第二泉作何分剖師云嘗過始得問黑夜中認賊為子認子為賊作何判斷師云呼名即應問家親作祟如何處置師云殺盡安居問的的主人翁如何得覿面一見師云求見者不的的問堪輿家羅經縱橫移動針必南指是誰作主師云真箇鐵心腸問家宅是諸人生身活計見得甚麼便肯破家蕩産師云解作家方者問電光中良驥瞬息千里如何得一往追上攬轡入手師云轡在居士手裏用追作麼問大慧云將八識一刀憑恁麼安身立命師云妥妥貼貼問未開口以前為甚麼便棒便喝師云做賊人心虛問胡來胡現漢來漢現是鏡體是鏡光師云毋容湊泊用在臨時問日升月沉雷轟電掣山靜雲間水流花開農歌牧唱婦誶兒嘻莫非是這個迸現如何得拈向腳跟下要用便用師云居士終日還飲啄也無問今修行人多怕去後黑漫漫地不知現前黑漫漫地更苦多口説無常生死事大不知現前剎那死死生生更切此際重關一擊如何下手師云眼上眉毛重七斤問高峰云大徹之人本脫生死為甚命根不斷命根既未斷叫做大徹徹底何事師云左搓芒繩縛鬼子問一句當天八萬門永絶生死這一句如何得恁麼有力師云世界賴斯成六雪首座問學憑入室知乃通方入室且置通方一句作麼生道師云斷貫索卻用得問入室事作麼師云稚子敲針問如何是坐斷毗盧底人受用境界師云敗葉成堆問倒跨師子底人向甚麼處行履師云羊腸鳥道問橫行四海底人未審具甚麼手段師云小伎倆問懸崖撒手底人命根還斷也未師云待闍黎命根斷即道問八卦正位如何排得師云不得錯下點畫問路逢猛虎時如何回避師云叉手當胸問鐵樹珊瑚因甚麼被泥牛衝破師云阿誰證據問無蒂曇花阿誰拈得師云無手者問金剛際水如何汲得師云何勞太攘問和尚壽室中有多少弟子師云心字不加點問祖祖相傳衣鉢未審和尚傳箇甚麼師云案山石上共汝商量問千問萬問不消咳嗽一聲都已答竟未審和尚如何答話師云知時節即退僧問昨夜見一鹵莽漢殺卻毗盧遮那如來未審如何判斷師云盡情斷卻僧問如何是白椎下事師云瀑布有聲雲不掩問如何是白椎前事師云深澗無魚水自清僧問古人教人及盡今時秪如及盡後又作麼生師云懶梳蓬亂髮喜遇當來賓僧問樓閣門中還容打瞌睡漢也無師曰待汝醒後即向你道僧問善財五十三參未審如今還行腳也未師曰洗腳上床眠一夜三千里僧問楞伽山既不可往為甚麼被夜叉王所據師曰手親眼便僧問鱉鼻蛇撞著赤眼人作何躲閃師曰恰好恰好僧問五家宗旨俱明因甚麼輪回不息師曰火燒山有光無焰僧問維摩經云除去諸有併諸侍者為甚麼連侍者不存師曰久住令人賤新來語自親僧問世尊赤手空拳開已又屈屈已又開未審明那邊事師曰秪明這個事僧問一切事究竟堅固不知大佛頂還在裏許否師曰暗裏抽橫骨明中坐舌頭僧問棒喝如雷還供養得閻鬍子也無師曰閻鬍子若來也須喫棒僧問從前老和上髑髏即今還有眼也無師曰布袋裏老鴉僧問釋迦彌勒還酬引滿二業也未師曰二業是他果用説甚麼酬與不酬僧問金剛經云應生無所住心既無所住又作麼生心師曰巖花鋪地高秋興松月銜山報曉晴僧問佛之一字吾不喜聞某甲不求佛日用事作麼生師曰下咽勤把箸燒火擇乾柴僧問古德云渠無生死世人因何又被生死使師曰青山元不動白日鬼迷人參旦生孝廉問是何面目師曰天不蓋地不載問作何究竟師曰地不載天不蓋問用何修證師曰穿衣喫飯待客迎賓師垂四問一問殿角風搖樹行人盡解衣時如何師自答云瞥爾沾嘗清涼徹膽二問清風翻白羽野老笑相親時如何師自答云春來花塢樵牧含情三問佛殿東南因甚缺了一角師自答云一人傳虛萬人傳實四問僧堂中有幾人坐臥師自答云翻身峰頂六不同謀僧問如何是君師曰澄潭水似冰曰如何是臣師曰楊柳拂飛塵曰如何是君視臣師曰古鏡幔白綾曰如何是臣向君師曰纖手按烏雲曰如何是君臣道合師曰一以貫之曰向上還有事也無師曰有曰如何是向上事師曰舌頭無骨野馬無韁僧問如何是君師曰水有筋山有骨曰如何是臣師曰鶺鴒鳥鳴似哭曰如何是君視臣師曰千年老樹挂枯藤曰如何是臣向君師曰樓頭畫鼓正三更曰如何是君臣道合師曰金闕鳳銜丹詔去邊陲人唱凱歌歸僧禮拜師問僧君位中事作麼生僧曰虛突兀師便打僧問如何是博山境師曰棲鳳巖前雲靉靉浴龍池內水滔滔曰如何是境中人師曰光剃頭淨洗鉢曰學人不會師曰這箇阿師還未曾剃頭在僧問如何是道師曰紅綃曰紅綃莫是道否師曰不是道曰既不是道因甚答紅綃師曰因你問道我答你紅綃僧問達磨未來此土還有佛法也無師曰有曰如何是本來底佛法師曰天不能蓋地不能載曰是何物得恁麼大師曰喚作物即不得曰不喚作物時如何師曰亦無你開口處曰恁麼則不奈何師曰我亦不奈何曰和尚因甚不奈何師曰為汝不奈何僧禮拜師曰出去救得千個萬個有甚用處僧問如何是某甲安身立命處師曰天無蓋地無底問壽昌老人遷化去即今在甚麼處師曰清談對面秪是不知師復問僧問語且置天無蓋地無底老僧意旨在什麼處僧擬議師便打勉云拶出虛空髓有味掀翻宇宙殼無依個中不見壽昌老獨有狸奴笑展眉僧問如何是北斗裏藏身師曰掉轉身來僧擬議師便打仍示偈曰掉轉身來酬北斗藏身一句絶來繇要知大像嘉州路雪覆千山盡白頭僧問寒暑相催時如何師曰鑊湯爐炭問未與料作時如何師曰淨地上一場懡㦬問成後如何師曰莊嚴妙麗一場懡㦬問家裏事如何師曰坐底坐臥底臥問門外事如何師曰鄉村險阻車馬為難問和尚為人事如何師曰從來不曾費鹽醋問一歸何處時如何師曰卻值老僧坐臥師問無擇上座曰賢弟到羅浮要與博山相見時如何擇曰遍界不曾藏師曰恁麼則不見我也擇曰兩彩一賽師曰更要親見一回始得擇曰無兩個舌頭師曰待汝到羅浮黑夜動不得步時即有深入師遂示一偈曰遍界不曾藏青松遮翠壁黑夜步難移深山神鬼泣
