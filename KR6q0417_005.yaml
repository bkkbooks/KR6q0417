body:
  text: 首座成正録書報詹定齋廉憲自去歲奉謁奇遇欣躍謂禪與淨土居士兼有之矣翰教遠頒若猶有意于愚師弟者何謙抑亦至於此竊謂毗盧性海人人具有從上諸聖語言及諸家公案無非發明茲義總在學者見解何如居士書中超脫之見即是此境現前一了百了更無二語若曰明于此或昧于彼恐尚是意識中得來非性地上徹悟耳雖然大善知識種福田植慧根何難于此道也即以居士勛業較量之闈中品士尺幅證心塞外閲兵一鼓作氣文經武緯用無不宜第令持此向最上乘中直是玄鑑洞觀單刀直入氣象貧衲將翹首居士了一大事因緣也與趙司理二貧衲草野疏陋承獎借過分且詔以靈光獨露之旨使振百丈家聲自愧何堪誠知大居士得此光明幢相三昧久矣故能以此光回照一切每惟末法中士大夫不罵佛謗法幸矣如臺丁深心力護如己眼目非徹照佛乘廣行慈願孰肯擔荷如此耶然知大居士雖作如是廣大佛事亦不作佛事之想雖發露此光而光非存照故盤山祖師云心月孤圓光吞萬象光非照境境亦非存此正與大居士機理相契處然下文云光境俱忘復是何物這裏到得便知云似地擎山不知山之孤峻如石含玉不知玉之無瑕學道入得此箇境界自然生死心破智不能知識不能識如來禪祖師禪一併打徹矣教中所謂絶心生死伐心稠林浣心垢濁解心執著塵勞佛事皆為遊戲出世入世云乎哉大抵貴在一念生死心破自肯承當而一切處自然法身獨露如青天白日一毫遮障不得若有絲毫疑情未盡即障道眼古人云一翳在眼空花亂墜昔長慶稜禪師坐破七個蒲團因捲簾廓然大悟乃作偈云萬象之中獨露身惟人自肯乃方親多年誤向途中覓今日看來火裏冰此即生死心破承當自肯樣子也古人深山二三十年草衣木食真參力究蓋為此耳貧衲自幼出家參尋頗力情關理路百揭千翻直得伎倆自窮所謂獨露者雖欲隱而彌彰不知其然而然至今喫粥飯始知甜耳以臺下家裏人説家常話非敢馳騁機解自揚家醜蓋承以靈光下照故爾借光放光然亦自知不揣其量溈山云此宗最妙難得其人末法宗風掃地久矣僧中寥寥不意縉紳先生猶見居士所謂清獻公再來非耶承大教辨明實際無物不有無物不空真俗二諦於中影現無法也而假名為法無身也而假名為身此真性一段光明開發顯露清淨無翳如朗月處空無不現者至云潛思于髫年根力純熟如此則十二時中固不待提撕話頭如香象渡河截流而過一超直入已是漸言耳第禪宗向上不説法身邊事要在機用回互深含獨占古人云懷州牛喫禾益州馬腹脹天下覓醫人炙豬左膊上此語亦不可作道理會亦不可作機鋒契要知十二時中潛行密用築著磕著不差毫髮徹見佛祖骨髓命脈則如居士所云縱橫自在御風而行者也若然者不把繩頭而繩頭自把即此繩頭復是何物上堂洵口而道為好事者録而成集忽被居士覷破又添一重公案也第捧讀佳製霍然忘暑所謂薰風自南來殿角生微涼倘因合刻永載法雲報沈東華廉憲二春日得聞報知福星照冰溪也此非小緣皆湖東子民善因所致惟林下人躑躅不敢前蓋公門中非僧家行處秪焚香遙祝而已承翰教豐儀仍問及宗乘中事豈但為僧者得沾惠澤即三千七百祖師公案亦復重宣也臨濟大師云一語中具三玄一玄中具三要此善知識臨機慧辨三玄三要未兆之先已通身突露非臨時湊泊如旃檀本香借火爇則分外香若以火論香則辜負旃檀若于言句中討玄要大可笑也諸家録中皆下語大似以鶴粉喻雪雖色相似去雪實霄壤惟汾陽頌云三玄三要事難分得意忘言道易親一句明明該萬象重陽九日菊花新灼有真旨大居士切欲發明斯道在臨濟喫棒因緣上會去則待客迎賓拈匙把箸三玄三要不問可知其或未然父母未生前那裏是我本來面目烏紗蓋頂黃金束腰傀儡一棚不加線索則生死暗然無寄本來面目是甚麼碗橽丘三玄三要留待台駕入山時再作個話會也讀翰教不能釋手知居士靈機浚發皆夙生般若慧之所成就非常情可及也惟祖師門下言句如煮木札羹如炊鐵釘飯不可以智知不可以識識惟悟與悟乃能明了若謂某為三玄句某為三要句某為先照而後用句某為照用不同時句正所謂以管窺天以蠡測海多見其不知量也大居士決欲發明此一件大事赤肉團上無位真人在六根門頭放光動地不得當面錯過若錯過時百劫千生未有了底日子將前解路如斬一握絲一斷一切斷更不相續無位真人是甚麼乾屎橛但恁麼究去一朝知痛癢時向大愚肋下築三拳是大丈夫作略非分外也若依草附木東引西證説心説性者可請一義學沙門將三經五論細説一遍禪之一字拋向萬丈深坑過不可説不可説劫後再可談不了之緣未為晚也不識大居士於此寧甘心乎昨承諭入道貴在真實真實二字誠入道基本也不識居士於真實處曾入道乎少林大師云外息諸緣內心無喘心如牆壁乃可入道果得心如牆壁則真實二字不言可喻若心中揣摩生諸解路早是不真實欲得心如牆壁安可得乎果得心如牆壁正堪入道若以心如牆壁便欲住足秪是箇心如牆壁漢不堪與語道也然心如牆壁不容易到有一等人將妄心遏捺令心不起謂之心如牆壁大似水上按葫蘆從少至壯從壯至老欲得心如牆壁無有是處真是箇究心人將一句話頭才方提起如吹毛利劍觸其鋒者即喪身失命欲其別生一念了不可得連真實二字安亦不住斯二字誠為入道之基本也大居士日用以此可坐進斯道不然則彈指一生可謂錯過了也真實云乎哉報林季翀大宗伯舊冬承翰教謂人生五十不知性命所在此為誠言非套子語也當知此事萬劫難逢千生罕遇既知有此關捩若不發明肯甘心耶祖師答見性偈云在眼曰見在耳曰聞在鼻嗅香在舌談論又云遍現該周沙界收攝在一微塵大居士可將此偈細看一遍眼所見耳所聞不逐聲色畢竟是何物也世人都被聲色所轉輪回六道無有了期一失人身萬劫不復可驚可怖可懼可畏如有智者當于此著忙世間功名富貴決定羈絆不得何也身非我有況身外乎看破此境界十二時中深追力究念念不移決欲發明而後已若能返照直下無第二人動轉施為無虧實相視生死如夢幻觀世界等空花永嘉云大千沙界海中漚一切聖賢如電拂如此做一個凡聖不拘底大快活人世間之樂事百千萬倍胡足為比他日向棲鳳嶺頭拍掌一笑何也笑此老婆心葛藤語耳報吳觀我太史二往返生生社與居士清談將半月如坐毗耶城正所謂彼上人者難以酬對然不二門向上更有事在故云不可以智知不可以識識譬如入都城四會之衢非行到不能親歷諸境嗟夫此道閉之久矣投子遠録公將五百餘載其間提唱者罕得其人生死分中似不可以解心敵如南嶽見六祖德山見龍潭大有樣子居士於此但當盡心單提一句話頭孜孜不捨以期大悟若徹見根源即無明結使不斷而自消根識境緣不澄而自殞可謂靈丹一粒點鐵成金自不與諸法門較優劣縱不悟站定腳根終有到家日子如不信斯道三阿僧祗劫始能成就古德云拼此一生乃至三生必能打徹豈欺我哉如看一口氣不來畢竟向甚麼處去此處字上要切要緊切不可將經書引證如教中謂無去無來等斯是毒藥不可沾著一點但會深追力究決定要討箇下落如前教乘中有相應法急須吐卻或澄心瞑目寂照相治虛靈不昧觀法無我乃至究竟不即不離及事事無礙等語在佛法中謂之入理深談在參禪人分上謂之野狐涎所以云鳳縈金網趨霄漢以何期居士不可不慎貧衲不得不盡情吐露也貧衲生少智慧唯參究一念子蓋切今與居士論及宗乘中事譬如居海者不問江河淮泗惟以海印印之耳所謂看話頭六代相傳未之有問答之際一語中放不過便頓發疑情如能大師問南嶽大有樣子自後諸家激勵皆曹溪一箇印子上來居士于此須發起大信心要徹生死決從斯門而入捨此別求是岐路非禪門捷徑于此事上決不可生疑決不可以教乘中印證所云散位獨頭倏起倏滅者秪須切之一字是破意識利斧也禪警語大慧回書禪關策進悉能助發如參究一日得一日實用縱一生不明亦不妨具成佛作祖底基本古所謂但辦肯心必不相賺承諭浮山聖道場處自有天龍擁護貧衲似不能應命山居人事叢雜年臘漸長兼以病魔日至每欲捨衆入深山邃谷以度餘年説法境緣付囑於大地有情待時節發生耳齊群玉居士才發信心須臾即沒無奈死魔壞菩提心印大可嘆息唯居士體認自己本命元辰莫管他世界成壞永嘉云大千沙界海中漚況漚中一鄰虛起滅耶與何芝嶽相國人生緣遇不易得皈向三寶倍復為難惟居士深入佛乘靈苗智種天性帶來而究竟一念子肯心自許誠進道之基本也昔人云我得百丈一句語做宰相此話一行使天下人皆知有佛法利益甚大非世間功德可比希居士燮理之日毋忘此一句話頭十二時中幸以大法為念直欲進陪上古洞鑒今時日應萬機不壞不雜觸境遇緣若臨大敵欲勝重門欲開猛浪中欲登彼岸大旱時欲得甘霖思到思不及處忽然摸著鼻頭原是舊時面孔端不借別人纖毫力若以世智辨聰揣度道理定信不及唯有力大人一擔擔荷更不搖頭轉腦也此事誠難決不可將經書上印證不可遏捺妄念不可使自心空寂凡諸動心皆成藥忌諒居士已深鑒此意不待貧衲贅語耳報徐止觀居士承諭末法下衰魔風熾盛宗門冷落主法無人余嘗于此撫几長嘆可謂襟期不隔千里同風但不識于此事中曾瞥地否若此瞥地不妨向祖師門下拋磚引玉撮土成金垂手將來與物作則盡大地是魔直從魔隊裏穿下過盡大地是佛直從佛頂𩕳上行然後向佛魔不到處解三玄戈胄碎五位鎗旗黑漆桶裏鑑貌辨色無影樹下嘯月吟風腳跟下動步覿體與博山相見倘未得如是禪警語不可不細嚼一遍提一個無義味話頭做一場沒巴鼻勾當一朝迸出頭來渾身當宇宙求其一衆生相了不可得何物在迷何人在悟居士與博山長太息悉剩語也貧衲掃一坐具地與居士作不動軒不識居士以為何如也報陳熙塘方伯疑情不起是生死心不切似與前諭中不相符合果生死心切是誰二字不明安得不疑疑情頓發心意識尚不起況解路乎雖兼淨土決不可生自足想安隱想斯二種是究心人大病居士不可不知識得是病終不蹈此二途祖不云乎不斬貍奴誓不休彼既丈夫我胡不爾是誰二字是斷心意識底利斧截解路底垣牆出生死底要津也參此二字法門如韓信背水陳不顧危亡始得相應耳只此一生判百劫千生不了底公案有智者當以日代歲身可寒肚可飢不可使話頭有間斷只須迸破疑團心意識及解路冰消瓦解始得大安樂地是大得便宜人百千萬倍不足為比也何如報陳若來使君瓶錫過貴郡方登岸即蒙台駕枉顧談及宗乘中事大發肯心歡忭無量別後六日登鼓山讀旌孝善果二録足見居士一片慈孝婆心超出常情萬萬也然人生如芭蕉無堅實相又如作客寄住旅亭雖有旨酒嘉肴安隱快樂自非久長惟智者必尋歸家計耳視此四大色身如幻如化一氣不來作何究竟此是吾人一件最要緊事於此不忙溫飽之餘悉為別人忙即溫飽亦是分外事況其他乎希居士慧發當機毋容暫息將一口氣不來畢竟向甚麼處去一句子孜孜切切只教覷破這一著始是大安樂處切不可從人言句上討分曉不可將經書上印證不可默照澄思以為得意不可因因循循虛度日子二六時中秪是一口氣不來畢竟向甚麼處去忽朝迸破疑團如駕輕車而遊熟路不亦樂乎放生業悉能助發機緣若得其所廣其悲願是貧衲至望報陳四遊京兆貧衲行業無補主持宗門無甚長處惟一肯心自許謬為先師印可自謂藏身幽壑以保餘年不意往來禪者以情量推之遂使水漲船高名過于實愧也何如貴境鼓山聖道場處加以玄沙黃蘗長慶雪峰每欲登攀無繇克就何幸檀越乘願力來城塹法門興揚三寶況以楨幹宏猷廟堂遠略為出世間畫一籌策頽風復振于今日氣象更新于此晤其功德熾然非毫楮能罄然依正互融真俗雙顯外營佛剎內護心城頓使無價寶珠輝天鑑地不知居士肯瞥然否古德云我有明珠一顆久被塵勞關鎖今朝塵盡光生照見山河萬朵繇此觀之世界不在身外道場毋論他方鼓山博山似不勞動步也承名敢不趨命第寒山色色有羈殊不如願諒摳衣有時但不敢以年月期限為約耳復邢梅陽孝廉并答貧衲方息慈時即聞令先師居京邸説法服膺豪傑摧折慢幢如雷如霆可喜可懼因侍受業師南詢不遑親聆教益迄今渴慕之懷歷歷猶在庚申冬接翰教始知居士入令先師籌室味無上法乳棄夢幻功名自非深有所得安得如此行履今獲居士長篇高論歡喜無量實以慰未見令先師之夙心也復承來諭謂時當叔季大法平沉魔外説法不啻河沙讀之至此則撫几長嘆足見居士一片大慈悲心腸雖未面晤可曰神交況古稀之年乾乾若是使懶惰比丘不無慚愧矣貧衲久廢簡編承居士殷勤致問不敢不竭思以酬來意一問狗子佛性之語似不可以識量卜度又不可在有無上作活計貴在真參實究果然當下絶親疏如風捲塵不留朕迹若在有無上捉摸何啻捫空論太陽遠近耶有角無鬚二種語翻趙州兩重公案思之可見非泛論也二問謂妙明體盡正墮頑空此是居士錯會綱宗之旨不但見錯兼義亦謬解文中云妙明體盡謂理極情忘力在逢緣有轉身活句況知傷觸不借中自非知有不知有者如寐語相似安能識其來源也此正是曹洞血脈如靈珠在握又如啞子喫蜜心口俱甜不能向人吐露若以頑空釋正所謂黑白相反也報阮淡宇郡伯二昨於緣幻場中與居士論及佛乘俱無詮次即同體大悲亦是未了底公案吾人果於日用知同體大悲則步步踏著實地非心外之境耳古德云樵子負薪歸機婦連宵織管他家事忙且道承誰力知恩報恩只此一偈不知居士折旋俯仰會薦之否果薦得則山頭之白雪清冷凍殺法身腳跟之流水潺湲侵損漁父駢闐車馬鱗躍子民不須格外酬機最喜塵中見佛狂歌醉舞誇本具之神通淨几明窗樂現前之三昧不礙恆居火宅何妨倒跨白牛弄窮子珠奪飢人食剖微塵卷閲大千經世間之樂事百千萬倍不足為比也貧衲以此酬居士枉駕之勞惟同體大悲訂今晚向華嚴寺中以償斯債希示的音其或未然明早則遠征之念已動接浙之行也滄海一滴也世界一塵也貧衲近在石頭城大作一場佛事究竟如幻大居士還見聞也無若見聞者作麼生是親切一句試拈出似貧衲使參禪作見聞種子也頃接翰教謂投芥未合良以宗門中事自非親到古人田地所有議論悉夢寐中語閲九帶敘煥然出奇所謂三止三觀乃至無上無向無一無著而一非無者斯即向上著此論至精至極無人能到但以貧衲觀之秪是教中底蘊亦是教中向上似非宗門中向上語吾祖師門下貴在轉位旋機底一條活路居士肯向著衣喫飯處輕輕覷破大笑一場始瞥地耳然大章不妨流通與天下人作點眼藥非文字也慧命中實受用也貧衲意謂宗門中長處只欲居士親到耳詩酒二事故乃陶情然詩能勞思酒乃傷脾台下高年幸清損之慰所懷也報王季常郡伯貧衲不憚番易八百長江千里為法求人雖則托鉢空回惟與大居士夙緣深重而殷勤護念過於骨肉蓋以法為親非世諦比也向蒙問及楞嚴深旨若窮其始終雖釋迦老人雲興瓶瀉亦吐露不出況其他乎若云清淨本然云何復生諸念此就衆生界中未達清等四字而言果知得清淨本然山河大地向甚麼處得來緣生諸念從識薰起識如夢幻但是一心斯即從凡入聖又不當以覺復生迷為難惟吾祖師門下一句話頭全身入理徹處如紅爐烈焰乾柴溼草無不燒盡還源如人到家決不被諸岐為障貧衲以此期大居士斯為出世正緣似不可別生疑慮也報俞容自勛卿蒙問及曹洞宗旨此之一學最妙最玄拈穴細金針穿芒長玉線彩空中色相織劫外花紋若非家裏人竟不識家裏事非功力能到非智識能知惟沒巴鼻道人始全身擔荷辨荎草之味似不難耳想居士天資近道當深留意莫錯過此一段大事因緣此生不打徹他時後日定悔恨在莫言貧衲不為居士説破決欲發明此事不妨以衆善助之譬如雨露滋嘉苗也報余集生居士震旦法席之盛無越於帝都雖代有隆替悉係因緣非智力所能強也唯我明聖祖神宗受靈山付囑建立三寶弘通大乘是以天雨寶花塔呈奇瑞宰官開士傾心法塹實千載一遇應斯嘉運也二百年餘芳規未替戴德愈新林下山僧朝暮祝誦未能報其萬一豈敢效懶瓚輩不思弘法深益且念正法將沉魔風熾盛稱悟稱證者已遍域中付拂付券者幾盡大地痛思古格為法重人寧以身陷泥犁不將佛法作人情是何心腸今時急於法嗣忘其遠憂是何意調獨掌不浪鳴隻輪無單運擬欲遁逃深山不忍見此荼毒而居士復以慈心三昧見召將令不慧復為馮婦乎宗通説通內護外護居士似無愧公美印高敝刓心孤嗣乏貧衲實忝晞運耳旻昭橫逼老人出山殊乏丈夫氣象剛刀雖快不斬無罪三十棒遠寄白門擒賊必先渠魁未知集生果能赤體承當與否百年曠茲盛舉何異慣劊快睹肥牲兩載疲於津梁猶如羸夫晲彼巨鼎且浮山雙徑先聲已到諸執事人攀轅恐後今年決不出山語已在前意欲踐後倘違初心以赴徵命難辭衆口進退維谷居士其代我商之一芥翳天毫端含剎邊隅都會孰劣孰優今古異局彼此殊勢易地未必相為暌合同異未可一轍而論若必按圖索馬恐劍去久矣高明如居士諒必不爾或是為法心深意圓而語滯耶諸大檀護未及遍復幸宣鄙懷統希照亮不盡與頑石禪人余出家來初歷講肆便知有此事因求出世心逾切于經教中非不留意知在識見中用事如經云以知解心入佛境界如將螢火燒須彌山終不能著又云如日當空照童稚閉其目自言何不睹多聞亦如是故知知解逾多非但不悟道且為障道緣也因拂袖別參初修空觀五年雖則塵緣淨盡于入理實未得力後于船子公案上又六年始瞥然也總不似賢弟寂而常照照而常寂謂之工夫欲將此心用心非但一生窮劫至劫似不能了何以故以能寂能照之心為根本故又以此心念慮不起為本體獨露豈待少時只饒從生至老總不起念此念之根曾瞥然否若果無根性于境緣上自不別生心觸目遇緣如木石相似于本體上亦沒交涉也況在念佛作觀之間邪不知賢弟將何為本體又將何為獨露若以念慮不起時為本體自是念慮不起非本體也若以常寂為本體即是常寂非本體也若日用行事為獨露正所謂業識茫茫非獨露也若將常照為獨露自是常照非獨露也如賢弟本意恐在教上揣摩即在八識田中認作本體故曰朦朦朧朧如在燈影裏行此是實供非妄語也去歲豫與賢弟坐松陰聞鳥聲堂上論現量取境如一一明了秪是教家事與宗門中悟入大似隔靴抓癢也三喚侍者非容易會去若作容易會國師彼時只消叫一聲便好云將謂吾辜負汝卻是汝辜負吾何必三呼三應然後乃爾須知別有深深意豈是檀郎認得聲便作悟門也舊時行履姑置之勿論果到不疑之地當時便得實用又何待病後為然睡夢不得自繇此又據款結案大可笑耳復云岑大蟲示人太孤渠往往見人陷此塗轍非是遏捺學者故爾為之乎當知岑師如吹毛利劍擬其鋒者即喪身失命可謂婆心太切也佛云真非真恐迷豈但掀翻識情窠臼即真之一字亦不知置之何地況以外書平旦之氣似之乎大似夢中説夢又可發千載一笑耳大珠和尚問馬祖祖曰即此便是大珠故為有力者負之而趨恐亦未知日用行履若向這裏認其太賒不但未會大珠恐亦未見馬祖也又云識者知是佛性不識認作精魂折中且置賢弟還識也未只須日用中是佛也須吐卻臨濟云老僧未曾向紫羅帳裏撒真珠與汝諸人胡喝亂喝作麼如不向紫羅帳裏穿下過來未免有紅紫之誚非宗門得力之句也又用心曰無事時不怕不明白唯防念慮起時若知一念緣起無生即化了此是將緣起無生化念慮宗門中還容得此等説話麼三十棒教誰喫又云應物時不怕念慮起只怕不明白明白時即有念慧有現照此又以明白治念慮宗門中還容得此等説話麼三十棒教誰喫又云本體本具照而寂也宗門中還容得此等説話麼三十棒教誰喫此即是教家老婆舌頭非悟門也又云不必工夫又云如是保任又云勿忘勿助種種皆顛倒度量之心非參究也即前為賢弟説只是似不是真即此似字亦權巧也安慰也如果似不待此體會動著便脫捺著便轉不必引經引教轉引轉遠不相應何也蓋為從來不曾參究悉以知解心印定正所謂認奴作郎認賊為子也古德云三世諸佛不知有狸奴白牯卻知有僧問九峰云如何是頭曰只須知有進云如何是尾曰盡卻今時其知有二字豈是揣摩識情以日用為知有耶豫曾拈云三世諸佛不知有掬明月於無影樹頭狸奴白牯卻知有剪白雲於不應山谷誰能知此意除是長嘯者與賢弟知有是同是別又云宗門中一切奇怪言句無非要人知此事只此見賢弟悟處若作恁麼知解宗門掃地而盡知有二字何曾夢見者乎只此知有賢弟便可用心直要徹見古人幽隱深奧所以云若要知此事直須高高山頂立深深海底行向威音那畔翻身十字街頭打睡更須白汗交流喫痛棒始得不然則照而寂寂而照終日保任終日不起念無事於心無心於事體悉此意未為良證也與善來禪人迢遞三千里因循十二時支那都走遍可惜腳跟皮汝才入門時便識汝了也東走西撞圖箇什麼若是皮下有血底漢子自當擇一本分宗師三二十年搬柴運水墾土掘地未為分外今時有一等假知識魔魅人家男女開口便云有甚麼禪可參有甚麼工夫可做直下承當蚤是遲了八刻繇此謂之俊捷謂之英靈謂之天然謂之超拔於本分上既不用心將這些業識銷磨不去噇了施主飯學詩學字學頌古學開示只饒學得口頭便利詩過李杜字壓鍾王頌古如雲興開示如瓶瀉秪喚作業識茫茫縱哄得人信向禮拜供養秪裝束得一箇皮袋子一朝敗壞時手忙腳亂閻王老子放他不過鑊湯爐炭劍樹刀山百劫千生未有了底日子出得頭來知是幾多劫數以清淨眼觀此等假知識如廁中蟲如淨地上荊棘如清風裏臭鴉又喚作無慚愧人無廉恥人汝還知麼汝還辨得麼若具參學眼向這裏辨得真偽便好于衲衣下抖擻幾根肋巴骨四大子假合便鼓兩片皮能講能言一口氣不來向甚麼處去莫承當個事便休去莫將經書上印證去莫隨善惡業牽將去莫將盡十方世界都盧是箇自己本無來去若如此見解將來飲洋銅吞熱鐵管取有分在既不如此又作麼生得的當一口氣不來畢竟向甚麼處去如坐在銀山鐵壁之中秪求迸開還容得第二念起麼還容得思惟分別麼到恁麼田地只須㘞地一聲向威音那畔又那畔翻個斤斗來始可向博山這裏喫痛棒不然且就千巖萬壑之中打野梩消日子總不干老僧事偈曰學道如牛毛發明如兔角人人喜平易那肯窺山嶽積翠與重巖終是難描邈名言并奇句情想亂穿鑿撞著黑面老未免遭貶剝有志丈夫兒趁時須早覺打破生死關始可稱絶學與劉胤平太史佛祖之道貴在得人如彌勒菴與諸昆仲初會時秪欲居士深生信解世諦有為之法非山野所望今科名巍赫係因緣和合偶爾成褫亦乃夙世靈苗之所發生當思之未兆之先所謂寤寐勤劬思報佛恩切不可自生怯弱孰為有力孰為無力孰為大根弘願孰為淺根劣器居塵出塵全身擔荷者捨居士其誰歟又當念生死事大無常老病不與人期失之剎那悔之永劫參究一念不可須臾忘卻禪警語作個策身符子遠離諸過以期大悟凡在佛門一切善事盡其力量皆可為助道因緣若半遮半掩即同流俗非佛門弟子博山有一頌不免舉似居士若向此頌子上徹去不須動步與山野大笑一場可謂老胡今日有望也頌曰博山事香燈居士援毫管千里審跬步兩人缺一半惟有過量漢不被時辰轉果知分寸長卻笑丈尺短楚水吳山霧一團森然雲樹謾勞攢梅花無意枝頭放爛熳枝頭驗的傳後二句是山野昔所和偈語居士高發時不知曾記之否敬以點破可發千載一笑文上養菴和尚七十壽鵝湖山高雲赩奕如蓋如幢金蕊色照世明燈坐道場一道靈光燭天北獨步寰中意自殊南方知識迥良模推開辨老門前臼奪得蘭公肘後符梅花枝上露消息倒跨燕都神駿逸金鉤海底鈞鯨飛天目峰頭銀浪激歸來占斷白雲春飯糗羹藜絶四鄰德比黃梅躬餉母詩同慈覺勸尊親天生純孝既如此等視衆生猶一子開堂法乳潤枯松説法金鱗躍芳渚今年七十從心度半倍趙州花甲數使得時辰珠走盤吞乾日月壺縣樹眉毛似雪畫難傳萬仞須彌聳巨川擬同嵩少追芳躅笑與支那較大千奠鵝湖和尚某年月日弟子某謹以素饈香燭之儀致奠于鵝湖堂上示寂先大師養菴和尚之靈龕而言曰於戲先師靈心湛寂道性貞醇幻化八十春秋渾無起滅成熟千生善聚示有去來梅花枝上笑拈不夜之春茶銚爐邊剩得活人之句見野燹而知起處境量消融封鎖鑰以驗方來真機獨露不起日旋三昧大施無礙鉗鎚悲花法雨灑人寰慈意戒雷轟碧漢不謂化儀告畢緣應已周金棺掩耀俄驚白樹以興哀鵝水藏珠不睹玉毫之散彩白雲慘乎無色瀑布凄以斷流頽法門之華棟四衆何依竭覺海之靈波群生失潤某等夙承洪鑄仰戴玄猷瞻模範以步趣風高莫及藉聲光而提命恩大難酬叨餐法乳之深徒戀雙趺之迹溪毛澗水聊為最後之純陀海月山雲永作吾師之供養至痛無文真照靡隔念佛文為棲霞一門禪人説夫淨土者乃一切衆生究竟安身立命處也念佛者乃一切衆生第一背塵合覺門也寂光真淨惟是佛居從此垂作實報淨方便淨及同居淨以接引彼菩薩人二乘人及凡夫人既從實以施權則無權而非實既隨義以立名應顧名而得義惟淨土之致不明故念佛之理亦昧但謂自性即是彌阤而不知彌阤不外自性但謂無念乃為真念而不知淨念即是無念是以究極於一心不亂則諸佛心內衆生時時成道托修於執持名號則衆生心內諸佛念念證真念惟是佛如百川朝宗大海佛全在念如琉璃內含寶月不惟感應道交亦且自他不二但令諦信不疑決定無諸岐曲也余幼慕禪宗得入壽昌之室謬承記莂三十餘年寥寥海內有唱莫和刁刀魚魯轉見參差方知祖師西來事出非常有大利者必有大害功高易進無如淨土一門念佛得度今正是時之語非欺我也一門禪友結蓮社於棲霞禪室攝念佛人同歸淨土可謂末世津梁人天標榜乞余一言以作警策余嘗謂一切行者須信自心有成佛種子信如來有接引大願信有淨土可生信有彌阤可見將一句佛號驀直念去念到一念不生則凡心即是佛心更何生死不了真可謂直捷穩當者矣勢至圓通文殊三昧誰有志者而肯捨置弗修習哉放生文為報恩自觀以之二禪人説五濁惡世缺陷衆生舉足動步無不是業招因帶果無不是苦而殺生一事則猶業中之業苦中之苦也止惡行善莫急於戒殺轉毒為慈莫善於放生故五戒十戒具足三聚莫不以此為初基果位聖人因中大士履真上賢出假菩薩莫不以此為首務初果鋤地而蟲離四寸道共戒也聲聞入定而刀杖變花定共戒也菩薩以自在力現三塗為淨土慈成力也如來以佛眼觀大地衆生同成正覺悲無礙也好生之德普涵於九界放生之功直圓於佛果而世人每易視之者良繇同體之理不明故也蓋性為生理識為生基生機蘊於意地生緣熾於六情遍觀三界無非受生之場備閲六道咸稟妄生之氣達無性者方了緣生悟無生者乃能護物以無緣慈運同體悲能會萬物為自己故拔苦與樂根於心現於事不期然而自然也若未明斯致形迹為礙物我成敵在彼既有必償之果在我仍造必報之因因果相酬循環無際苦口良藥如水投石則奈之何然奔濤狂瀾勿忘中流之砥移山抒海弗替初心之誠難行能行亦在當人之自奮耳苟能斷殺業除殺法離殺緣滅殺因忘殺機於根塵識界盎生理於依正自他則菩提涅槃便可向放生一事中薦取豈世間功德所能倣佛哉自觀以之二禪者率諸善友創此社於報恩大剎豫為申明其義以告同仁俾能放所放咸契無生緣生之理庶地獄可以頓空佛性可以頓了謂放生社即寂滅場可也序重刻五燈會元序釋迦不出世祖師不西來佛法遍大地談玄口不開當此時也語言文字蹤迹不來棒喝機緣鋒芒不露逮夫拈花示衆牽起陳爛葛藤立雪安心突出現前公案遂使宗風廣衍慧日高懸燃長夜之燈群昏頓曉拈一莖之草法界齊觀駕車須是打牛磨磚豈能作鏡如靈丹一粒點鐵成金至理一言轉凡成聖六代破水中之影觸目皆真五宗競空裏之花通身是膽橫趨而出笑木棎以何堪撩起便行悟佛法無多子睹水影不從他覓處處逢渠斷腳脛痛見己非頭頭是道若論佛法一切現成諦審玄猷千燈互照龍蛇分于棒下凡聖藉以喝通機發于未兆之先用施乎形聲之外乃至一言褒貶一棒縱奪以非為是口似甜而意甚苦之以是為非心實允而辭無洽矣雖久參耆宿不敢以正眼覷況識情解路能通之乎所以道狂機劣解不可以大法示不可以宗乘聞譬夫美食置諸穢器祖不云乎醍醐上味為世所珍遇斯等人返成毒藥惟大心衆生始能擔荷入斯乘者不可不自慎也會五燈為一書者宋靈隱大川禪師未蒙入藏雖一二處刊行安能廣布自性禪人頓發大心謀於觀察曹君為之首倡募諸同信工過半矣余初上鼓山聞其事歡喜樂成復徵余為序因援毫以書其大概云爾萬佛名經壇儀序衆生淨覺諸佛慧門繇薰變而成凡隨淨緣而見佛既隨緣染緣實無生聖凡迷悟悉強名也圓覺經云知幻即離不作方便離幻即覺亦無漸次如此領略不假漸修非作故無本性無故良以衆生情生智隔想變體殊趨暗背明捨安投險縱無明之嗔火燎功德之稠林沉業識之愛源漲真常之覺海戒乘路塞人我山高衆妄起而邪見生諸器成而金體昧隨情逐境破四棄之清規動念乖真結八重之障罪根本繫乎七衆無論是俗是僧結業失於一時豈分在此在彼受六交之苦報雖千萬劫必償造十習之惡因縱億萬生不返是以群靈競出大聖垂休駕苦海之慈航開覺城之鎖鑰説難思之懺法彰諸佛之洪名設壇結界獻供懸幡燒種種香散種種花興大悲念發菩提心禮佛一拜借壯士臂以折慢幢念佛一聲擲如意珠以澄濁水空諸我相徹彼真源如滌淨器以見純金似揭晴空而清智眼貴在力行毋容忽念瑞凝相現罪滅福生若能諦信不疑定許超凡入聖斯經自某朝翻譯載於藏典人所罕聞茲因某禪人化某居士運大乘心廣諸佛行嚴涅槃岸拔衆生苦消黑業于當念財法二施投智種於悲田賢愚一致或云我本宗門禪客毋容瑣瑣事諸壇儀當知彼即地獄罪人莫呵饒舌願賜流通重刻圓覺經序夫緣生無性生佛之迹本虛無性緣生聖凡之形宛爾隨業感而報分優劣逐境浪而識變精粗如來大光明藏是衆生淨覺之本源衆生最清淨心是諸佛本起之因地當知無明無體皆是空花實際非塵妄念輪轉究竟圓滿體常寂以遍十方平等道成心恆通而舍利土不妨以幻修幻肯信居塵出塵開總持之門絶去來之相登涅槃之岸忘得失之心虛空何更生花真金不重為礦貪欲斷而生死斷愛渴除而理障除非植二乘頓超五性無取無證眼不自見眼非智非愚心不自生心植衆德本成就道源悟圓覺以淨覺心取靜行而澄行證客塵永滅妙體方周聞在剎那悟通曠劫二十五種輪觀隨順繇人百千萬種法門樞機在我執四相而生顛倒二妄相依了六情以契圓明一心匪礙作止任滅仗知識以銷融憍慢愛憎觀衆生而同體期限成純淨之樂懺悔斷結習之根悉備上機頓圓種智是為十二分經清淨眼目三千七百祖師密傳之要領也茲因顧居士發心重刊使一切衆生入文殊智海普賢行門履圓覺妙場坐華嚴法界激豫序引豫不敢以宗乘中較其優劣大抵就斯經旁通箇消息耳是為序建州弘釋録序余作驅鳥時嘗遊閩中知建州為理學淵藪後閲傳燈諸書又知建州為禪學淵藪每見建州僧必詢其鄉之先正然往往不能對因為悒悒久之丁巳春吾弟永覺師初棄儒入釋從壽昌先師學枯禪因與道其鄉之先正甚悉皆粹若珙璧逸若鳳鸞多余所未及知者余喜甚指其胸曰此是一部僧史記師曰吾將志而傳之無何先師沒師來博山同居者五載余間索其舊諾師曰俟識鼻孔後為之後歸閩隱山未通消息戊辰春余自鼓山還博山道經建州師迎於開元寺余一見而識之曰今可志建州僧也師笑而不答余乃問曰壽昌塔掃也未師曰掃即不廢秪是不許人知余曰汝偷掃去也師曰和尚又作麼生余曰掃即不廢秪是不曾動著師曰和尚似不曾掃遂相笑而別至己巳冬以書來博山則建州僧志成寄以相示且徵序焉余閲其所集凡分之為四科首曰達本重明宗也次曰顯化彰應也三曰崇德録衆行也四曰輔教備金湯也合之命名曰弘釋崇法化也其識正其論確其採訪博其分界嚴非良史也耶昔者道宣作僧史於唐弗長於文且不知有別傳之事齊達磨一宗於枯寂之輩識何暗也贊寧作僧史於宋學富而才疏且列黃蘗於感通列嵒頭於遺身列永明於興福至於雲門僧中杰也反舍之而弗列則其謬為尤甚覺範繼贊而有述高華秀朗登作者之壇然止傳禪宗諸彥可以稱全史乎今師所志雖僅僅一州而宣寧讓其雅當覺範推其完備迥然獨出前無作者即此可以窺師之一班矣矧千載之上藉師而傳之千載之下藉師而知之是師之功固在千載之上下也建州稱弘釋者非師而誰歟余故樂觀厥成不辭而為之序抑又聞師撰述甚富盡當殺青以傳若然則天下後世有大造焉非獨一建州也余請拭目以俟之重刻蓮宗寶鑑序優曇大師徹證禪宗專心淨土自利早圓悲臻未悟將念佛一門集成十卷顯諸佛轉未轉之機輪闢衆生信不信之障礙其引據確其總攝周其設教融其指歸捷可謂大有功於後學者也慨末法我相自高邊見分執貶淨土為小乘指念佛為權行甚者向人涎唾下覓尖新語句蘊在八識田中以為究竟極則及乎到頭一毫無用是之謂棄楚璧而寶燕石返鑑而索照也其亦不辨甚矣夫我釋迦文佛不妄語者不異語者彌阤經云一心不亂專持名號乃至七日即得往生法華經云若人散亂心入於塔廟中一稱南無佛皆共成佛道此其披心瀝膽徹底為人此言不信誰為可信此言可信又何疑于淨土念佛之門乎要而言之七日不亂為何等心入塔廟稱南無佛之時又何等心能者得之禪道如是而已若是真師子兒哮吼一聲百獸腦裂説淨土亦得説禪亦得説淨土即禪禪即淨土亦得雙是亦得雙非亦得終日念未嘗念終日生未嘗生終日無念不妨説念終日無生不妨説生圓阤如摩尼珠求其住足處了不可得何禪何淨土而乃二之然雖如是更有一句彌阤未曾道著欲盡情吐露奈舌根短也噫掣電之機留待哲者八關戒序衆生受佛戒即入諸佛位位同大覺已真是諸佛子此菩薩戒非八關戒也然戒有大小體非異同戒有廣略理無分析戒有斷續性絶開遮自非利生大士不無犯于塵勞有力行人何難行于頃刻躋緣生之道岸一日之齋通纍劫之津梁一日之戒謾言瑣細具得全功不論短長頓同全戒譬如飲海一滴味同全海又如一滴投海同海全波須知戒淺功深因微果徹興聖人之方便悲開詣實之權標大士之指歸喜見從權之實清山主撮其簡要吳太史核其攸同收圓行于一時植殊因于永劫不揀貴賤勿論智愚但辦堅實心腸定入華嚴藏海生生社戒殺放生序語云護生須是殺殺盡始安居此勇猛丈夫決定志也良以衆生恣無明窟養爛壞身秪解殺他不知自殺五魔熾盛六賊戕害四蛇毒攻二鼠交嚙從劫至劫殺吾慧命劫吾法財可謂大冤家大怨敵而且親之愛之從而結之殺一切衆生噉其肉血恣養四大一氣不來盡成灰壤因有限身造無窮罪根性陜劣迷極不返三途報至誰當代受若能返照是大不然當披堅固鎧仗金剛劍斬魔賊于五蘊蓋林中逐蛇鼠于無陰陽地上廣法身之慈愍起同體之大悲見一切衆生如一子想無彼我相以無緣慈化無相衆生此雲棲老人深達法相也湛上座興悲運慈悉倣雲棲軌則而桐之諸上善人互相鼓導生社繇此而興殺業繇此而斷豈但戒殺而且放生豈但救衆生命實乃續諸佛慧命廣一切衆生慧命也何以故以同體故其無功之功無德之德所謂以殺為生吾不得以筆舌名之也報恩品序聞夫苦海無邊慈恩匪一情想局于限量識性迷于無知限量則灼有親疏無知則妄分彼我輪回于生死三途之業報何窮旅泊于人天九有之升沉不息改頭換面多生父母結盜賊之冤戴角披毛歷劫宗親償兒女之債大師興慈悲念説四難報之法施長者現衰邁年誨一惡性之逆子胸前而寢膝上而遊真情普矣男為慈父女為悲母親愛彌乎以世界為殿堂以人民為根本國主之深恩莫報以神通為利樂以度行為修因諸佛之慈德無休捨幻化財植人天福身命頓超棄有漏軀絶堅固想傳心為最解法義而流通法義還他三界智人知深恩而報答深恩須是九濤居士不辭饒舌願入斯乘正觀禪人刺血書華嚴諸經跋夫大法難逢真乘罕遇千燈供佛酬半偈以何辭四句潤心捨全身而不吝況破塵出寶法界全經大士因門如來果海塞滿龍宮之藏具在一塵播揚鷲嶺之奇縱橫萬象自非曠劫植菩提之因地安能手捧目觀偶此勝緣哉正觀禪人夙薰種智修假多方出娑竭之湧泉繡貫花之妙品加利刃不見當機之痛流鮮血無慚捐體之施書報恩金剛華嚴共計一百有餘卷以弘寶筏庶渡迷津蔓衍不二之雄文舌根流出騰躍難思之義海筆底翻來反觀法帙得成肌膚無損勝妙廣博幻質何乖得浮世之便宜履法門之徑路妙緣斯在道岸非遙疏廣福菴化藏經疏箇中不立元字腳一大藏教向甚麼處得來隨方建立總持門七百函經從自心中流出睹明星而悟道瞿曇之鼻孔頓開拈莖草以投機帝釋之面門剺破一片白雲瀰漫幾多歸鳥迷蹤山河大地作琴聲到處花飛蝶舞水鳥樹林談實相何須鳥迹蟲文得魚兔方捨於筌蹄盈倉儲始忘乎田地剜千燈而供養信知大法難逢捨四大以酬心秪為恩歸有地周廉溪發弘誓以相資衆居士乞片言而為引續佛慧命而壽命無疆勞己色身而法身始顯佛緣克就世道遐昌覺慧寺化藏經疏法幢高豎人天之白業薰成寶藏遙頒緇素之玄風始著捨金輪而談真諦拴回帶雨泥牛剜赤肉以博真詮倒跨嘶風木馬普眼雲興二百問人人衣縫綻開普賢瓶瀉二千酬箇箇鉢囊盛滿抉驪龍之至寶須探覺慧奇蹤踵伏龍之芳塵要入普聞玄徑天垂寶蓋千餘年之靈運重來地界金繩四大海之真源復湧打開瞿曇寶藏大家乞我一文豎起慈氏層樓普願同拈片瓦緣生之實相有據誰申較量之功性地之靈苗再生好下有情之種護生社募緣疏真心彌亙寧有六道之殊形妄念隨緣遂感多生之異質如來大光明藏是衆生淨覺之本源有情最癡暗根含諸佛妙明之因地雖報緣聰聰蠢蠢然覺性完完全全蛛結網機械可知鵲營巢靈心逾巧鱔解鑽泥而隱虱惟趨暗而奔觀蠕動咸自貪生雖傷殘而猶戀質舐兒之鹿涕泣而腸斷幻囊護子之蟲命壞而身環舊穴瘳乳捨將烹之鱉投珠醫未死之蛇何忍剝皮剔骨活潑潑以入鑊湯劈腹剜心魂飄飄而驚爐炭淚未乾而皮毛脫落肉尚動而廚灶喧譁可憐頃刻下咽喉誰識神號鬼泣肯信無端被燒炙須知果欠因酬三途之業報無休萬劫之羈縻不息豈可恣情悖理烹鮮擇肥惻隱忘大聖之真慈食噉導凡愚之惡習無纖毫好生之念藉口曰萬物養人興殘慘造業之心又豈知三途在我不爽絲髮如影隨形普告達觀長者大發慈心效解網之仁啓放生之會杖頭之青蚨不惜囊中之故鈔何慳脫籠檻如出囹圄好看理羽毛而愈快免砧几如離屠肆灼然全幻體之靈知鼓翅空中現黃衣而拜主昂頭水面旋印紐以酬恩果報無差循環不息莫呵饒舌願賜登名法雲寺修造疏華藏獻奇閩地概稱佛國閻浮選勝樵潭剩有僧居喜列祖以傳燈賴衆檀而樂善山林積翠泉石凝光茲因道鐫禪人鋤破雲霞芟除荊棘寺基復古殿宇維新酬微笑之勝因集同參之淨侶橫吹鐵笛倒跨泥牛採汲不虛施一任蒸雲驟雨茶湯應有待從教日炙風吹烹佛祖之心肝敲虛空之骨髓直欲頓開碧眼預須成褫莖茅嚴丈六之金身旋七重之寶蓋飲斷流之迅水踞峭壁之懸崖炊無米之香糜燃非薪之烈火鄉坊城市總須乞我一文居士宰官普願親垂隻手果因不昧佛道斯成
