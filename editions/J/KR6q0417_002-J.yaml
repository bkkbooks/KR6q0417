body:
  text: 首座成正錄董巖語錄上堂諸昆仲若論佛法列位未出禪堂門博山未出方丈門早已漏逗了也又何待打鼓陞堂拈槌豎拂揚眉鼓舌然後為佛法哉然雖如是不免向第二門頭為大眾宣說若欲決擇此事須具大信根信根若具便起大疑心疑心若起便得大悟門所以云大疑大悟小疑小悟不疑不悟夫信者何須信有教外別傳之旨拈一則無意味公案蘊在八識田中如弊囊盛寶相似將自己參悟一念如金剛王寶劍直須仗此劍剖此囊取寶到手始得正剖與未剖之際不可起第二念有毫釐分別處即是第二念也有毫釐被世境牽引處即是第二念也亦不得置在無事甲中若置在無事甲中即是第二念也離此種種諸念正是做工夫得力處且道如何是無義味公案如僧問古德如何是禪德云猢猻上樹尾連顛又僧問古德如何是禪德云猛火著油煎又僧問古德如何是禪德云杖籬山下竹筋鞭又僧問古德如何是禪德云碌磚此四轉語如天普蓋似地普擎隨拈一則參究若真發明一一皆吾家故物耳且道發明後又作麼生行履復笑云海為龍世界空是鶴家鄉上堂佛法知時節秋風特地來秋空秋色滿秋葉砌秋䃈當此時也銀蟾吐彩丹桂飄香雁傳北苑之書人問歸鄉之路所以云欲知佛法當觀時節因緣時節若至其理自彰諸禪德還有知此時節者麼若未知便好知去當知知之一字眾妙之門莫待臘月三十日手忙腳亂便悔云蹉過好時節了也若知得又何勞博山在此座上叨叨呾呾豈不見南臺和尚云善哉三下板知識盡來參眾既知時節吾今不再三然雖如是南臺和尚腳跟猶未點地在眾中還有簡點得出者麼若簡點得出便進前掀翻繩床喝散大眾博山也怪伊不得上堂若論佛法一切處現成法眼由斯領悟地藏以此傳心看他師資授受之際有甚麼奇特所以云釋迦未出世達磨不西來佛法遍大地相逢口不開諸大德欲明佛法須向釋迦未生時會取欲明教外別傳正法眼藏須向世尊未拈花迦葉未微笑時會取欲明安心之理須向達磨未開口二祖未斷臂時會取於斯時節會得猶較些子若待世尊生下時一手指天一手指地周行七步目顧四方自云天上天下唯吾獨尊便已納敗闕了也所以雲門大師云我當時若見一棒打死與狗子喫卻貴圖天下太平可謂將此深心奉塵剎是則名為報佛恩諸昆仲其中還有知恩報恩者麼若有可請出來與吾相見其或未然可趁此手強腳健快須努力決明此事始不被天下老和尚舌頭瞞也良久云會麼相逢不飲空歸去洞口桃花也笑人上堂諸昆仲欲參博山禪於未開口時會得猶是落二落三了也稍覺遲疑便合喫痛棒又何待開口縱能會得堪作甚麼豈不見從門入者不是家珍又安可為當家種草也臨濟大師云向第一句薦得堪與佛祖為師向第二句薦得堪與人天為師向第三句薦得自救不了博山則不然向第一句薦得便合喫痛棒向第二句薦得添枷著杻向第三句薦得斬頭求活何以故個中半句也容不得誰與你論第二第三鼓粥飯氣去也諸昆仲欲明這個說話把萬緣放下單單只究此事如一人被萬人趕來一趕趕到萬丈坑邊若不跳下便碎屍萬斷當此之時懸崖撒手拌身一跳直教到底使虛空粉碎大地平沉待氣息甦醒起來便走上岸此岸即是大路搖頭擺手到家始得諸昆仲莫說此事是難便生退屈若生退屈百劫千生無繇解脫須發勇猛信根當知乃佛乃祖皆如斯成就彼既丈夫我胡不爾古所謂松花若也沾春力根在深巖也著開上堂至體無生何拘緣境理無修證行絕階差所以云有相修行多劫終成敗壞無心體極一念頓契佛家且如博山在此座上列位承聽我法是有心耶是無心耶若說無心聽法者誰若說有心將何頓契佛家非但不契佛家猶恐墮有相修行而多劫終成敗壞矣諸昆仲若究本體無生便合本妙教中云諸法不自生亦不從他生不共不無因是故說無生此四句偈徹底為人是教中極則若是衲僧分上一點也用不著何以故在此淨白地上誰管你自生耶誰管你他生耶誰管你共生耶誰管你無因生耶若向衲衣下會去說自生亦得說他生亦得說共生亦得說無因生亦得何以故在此人分上天不能拘地不能束陰陽不能管五行不能局不作眾生不成佛道且道畢竟向甚麼處去良久云佛祖位中留不住鑊湯爐炭孰輪迴上堂面西行向東北斗正離宮道去何曾去騎牛臥牧童慈明老人舌頭拖地列位知得也未當知此偈非妙悟而莫能知悟非情盡而莫能曉情非工夫而莫能忘若於此偈徹去三千七百祖師說話皆一場笑具說甚麼君臣五位接引初機說甚麼炤用三玄誘諭後學所以云靈苗瑞草野父愁耘玉瑣金匙智人不顧若具超方眼目即是洒落衲僧便好打禾山鼓唱德山歌擎秘魔叉舞道吾笏向十字街頭搖鈴振鐸於孤峰頂上嘯月吟風其間還有與博山同遊戲者麼眾無對復笑云有意氣時添意氣不風流處也風流上堂道非難亦非易要在當人無師慧一拳打破太虛空一腳踢翻滄海水翻身直向新羅國須彌倒挂毫毛角皓月團團出海門清風匝地難描摸難描摸知不知今古攸分類不齊丱角總言心量大年來方覺語聲低語聲低辨端的對面白雲千萬里分明覿面更無真暗似日兮明似漆諸昆仲須委悉更有容易禪重與通消息良久云初三十一中九下七上堂一即一切一切即一明似黑月暗如皎日於此四句之上會得便見燦大師七縱八橫釋迦尊九紫十赤其或未然更有容易禪與君須剖析豈不見水面挂燈毬東壁打西壁生銕鑄蒺藜拶出黃金汁阿呵呵甚奇特明眼衲僧須辨別參因事晚參今晚好月天眾見麼可謂玉鑑光輝觸處週幾多盲瞽黑漫頭可憐不受金錍者頭白終歸暗裏休此月古今評論者不少自世尊以來迨于今日千賢萬聖莫不盡力提攜老婆心切簡點將來秪說得月影邊事要見真月麼須是自己開眼始得所謂靈山話曹溪指南泉翫寒山比說得彷彷彿彿依依稀稀縱然道得十成博山未敢相許何以故肘後不具靈符盡在是非窩裡大眾直須努力跳出是非關若不跳出是非關三途黑暗將何抵珍重上堂二月半春風撼面時光換百花郊外鬥芳妍好鳥枝頭爭噪亂惟有禪家渾不改塵毛括盡大千界淨土分明在目前直下是名觀自在誰更云玉閣瓊樓誰更云幢幡寶蓋咦夢幻空花何勞賭賽最喜杉山王老師人人只喫一莖菜歲旦上堂和氣生枯卉寒雲散野郊木人占吉兆夜半露龜爻大眾此是博山寺五百年前無隱經禪師歲旦上堂語山僧今日亦有四句燭影搖紅處香煙飛白時現成的佛法也要大家知如此會得便見一年十二月月月如然一日十二時時時相似如黃金之黃白玉之白曠大劫來未嘗變異大眾且道那裡是現成的佛法眾無對師良久云東君昨夜傳消息報道新年喜太平上堂萬里不挂片雲虛空突出眼睛放開七片八片收來一丁兩丁只饒通身是眼筭來秪得八成大眾還有十成的衲僧麼咦且莫道著便下座董巖菴講維摩經請師上堂五百童子從妙喜國來腳跟下多泥水三萬菩薩往毘耶城去牙痕裡盡雌黃不因示疾老毘耶劍戟鎗林難下口諸昆仲當知至體無法可繫強名曰淨求其淨相不可得但有其名名亦不可立或云無垢稱木人看陽燄翻波石女聽乾城逸嚮不留朕兆法界齊觀鼓吹將來一場露布縱是通身無口未免大笑毘盧諸昆仲當知法假人弘碑文刊白字題因人立當道種青松猛虎喉中活雀兒救得是好鱉鼻蛇邊爛拄杖拗折為奇且道博山意在什麼處吽吽以思惟心測度如來圓覺境界如將螢火燒須彌山終不能得然則博山今日高登華座大展法筵敢問說何法耶解脫法耶不思議法耶不二門法耶現神力法耶咄是何言歟良久云維摩大士來也稽首大士雖則塵面蓬心要且起居多福經題上堂如是之法我從佛聞如是之法佛從我生拶出虛空之髓倒拈莨蕩之針觸著三世諸佛鼻孔只得吞聲忍氣一任諸上座抱大不平諸昆仲當知身外無土誰是佛國土外無身誰非佛國湖南老人一麟角解道聖人無己靡所不己又云會萬物而為己其惟聖人乎然此則佛即國國即佛佛外無國求其國不可得松陰凝翠壁國外無佛求其佛不可得香霧靄青蘿博山總不恁麼是佛好與一摑直教虛空粉碎大地平沉是國好與一摑直教大地平沉虛空粉碎諸昆仲直饒煉作一團未是衲僧向上事何以故功德天黑暗女有智主人二俱不受佛國品上堂法身無去來之跡應萬有故不來而來至體絕上下之分總群機故不合而合寶蓋覆三千之界微塵等剎海之方山河大地川流泉源日月星辰天龍宮殿乃至十方諸佛說法悉現於寶蓋之中寶蓋覆世界百千萬億世界入於寶蓋而世界不小寶蓋不大世界覆寶蓋百千萬億寶蓋入於世界而寶蓋不小世界不大於此五百寶蓋而結成一蓋莫是如來神力耶大定莊嚴耶淨心變現耶乃至無我無造無受者之所成耶若如此會則未夢見寶蓋在古德云大千世界是沙門一隻眼喚寶蓋在諸上座眼裏得麼大千世界是沙門一點靈光喚寶蓋在諸上座靈光裏得麼大千世界在沙門一點靈光裏喚靈光蓋覆寶蓋得麼若如此會去非但凡夫小乘所不共乃至諸大菩薩所不共文殊普賢亦不共釋迦老子亦不共維摩大士亦不共何以故報化非真故華嚴經云若有見大覺解脫離諸漏不著一切世此非證道眼且道五百童子是證道眼耶非證道眼耶若是證道眼五百童子眼在什麼處若非證道眼五百童子眼亦在什麼處諸昆仲作麼生是證道眼門前脩竹來儀鳳澗底清泉隱臥龍獻寶蓋品上堂若欲說佛法無法可說法若以法說法恐辱於大法然雖如是博山亦無開口處列位請博山登此座何為也不免俯順機宜向第二門頭聊開一線將淨土二字從頭註解一遍去也心淨土淨大千世界摩尼鏡打破鏡來時與諸上座相見土淨心淨運為不出那伽定七顛八倒時與諸上座相見眾生行業不同途猛火燄中那容蚊蚋美惡從彼類所現瓊花鏡裡影象昭然欲求淨土眾生心行中求從來不曾點污豈但淨土佛亦不為安用求乎譬如造立宮室若於虛空終不能成西天不逢唐土不會若以空地隨意無礙根塵界中具此一坐具地在梵天鶖子而所見不同易分雪裡粉諸佛眾生而本源一爾難辨墨中煤於是如來以足指按地曠大劫來未嘗變遷不勞神用即時三千大千世界若百千珍寶莊嚴喚作瓦礫砂石坑坎堆埠得麼譬如寶莊嚴佛無量功德寶莊嚴土等無有異自在天宮向什麼處去也螺髻梵王亦須具慚愧始得諸昆仲清淨寶莊嚴土悉皆圓現諸上座還要見也無若要見便向這裏見去若不見自是諸上座不見怎怪得博山良久云舌頭無骨眼無筋對面白雲千萬里淨土品上堂善權有則謂之方物應斯順謂之便大海全歸一滴太虛秪是一線擲出駭雞之犀入彼婬坊酒肆放出屠龍之手何妨俗舍魔宮現長者居士之身雲藏無縫襖作帝釋天人之主花綻不萌枝諸昆仲維摩大士以大悲入生死海不捨眾生故以大智入生死海不迷眾生故逮乎開物導迷應時動善如一面寶鏡相似汝將一莖草來鏡中便現一莖草鏡安得成草也汝將一錠金來鏡中便現一錠金鏡安得成金也汝將瓶盤釵釧來鏡中便現瓶盤釵釧鏡安得成瓶盤釵釧也諸昆仲當知終日度生不見生之可度金剛三昧經云不生於化其化大焉南岳大師云十方諸佛被我一口吞盡亦此意也又如烈火燄中是草是金是瓶盤釵釧盡入於烈火燄中煉成一箇不留影跡還知維摩大士落處麼四海浪平看華鱗而吞吐九霄雲淨憑靈鳳以翱翔諸昆仲且道吾祖師門下與維摩大士還有優劣也無叫侍者維摩大士在甚麼處喚來與博山揩背方便品上堂諸仁者是身無常無強無力無堅速朽之法不可信也若如此看徹四百四病沒處安著四百四病既沒處安金剛不壞之身當念具足無量功德之聚覿體全彰四無量心六波羅密無不備舉古所謂若要直捷會一切總不是若要直捷會一切總皆是諸仁者還要直捷會麼金剛不壞之身即汝等精液膿血是也無量功德之聚即汝等四大五陰是也四無量心即汝等集起緣慮是也六波羅密即汝等根塵界處是也如此若不會執身取靜非宴坐也我垢不除非說法也慈心不普非行乞也不達平等非法食也不觀根器非適機也不了真空非論義也相無相見非天眼也不達實相非奉律也不履無為非出家也不識佛身非巾侍也諸昆仲十大弟子各負己之功幹大似棄滄海而逐波向日中而逃影豈智者乎然雖如是總被維摩大士將泥彈子換卻十大弟子眼睛去也十大弟子還知痛痒麼譬夫堯眉八彩舜目重瞳從古洎今縱有巧手丹青畢竟描寫渠眉目不出諸昆仲要見堯舜眉目麼直須向堯舜未生以前開眼始得弟子品上堂妙道虛玄方之以實真空廓爾體之以靈徹妙德以無方齊古今於一念彌勒不退轉之行撮摩空花釋迦記未來世之尊延綿夢境四事推尋求其生不可得一念彌亙括其記安寄乎既解空裏弄花不妨夢中說夢古所謂安置水月道場成就空花萬行降伏鏡裏魔軍成就夢中佛事非此之謂歟夫菩提者不可以身得六月火燒無影樹不可以心得三冬人嚼孟津冰不可以身得身是菩提故不可以心得心是菩提故萬紫千紅就裏無邊春色身心及菩提是三無差別桂林月渚個中誰辨秋光於實際理地求其身不可得求其心不可得求其菩提亦不可得到此則步步登玄智不能知識不能識所以肇公云聰者無以容其聽智者無以運其知辨者無以措其辭像者無以狀其儀及乎開物成務應化無謀古今天地人物日月星辰森羅萬象人叢鳥跡城市鄉坊車馬駢闐晝明夜暗莫不悉承菩提恩力當知舉足下足無非淨名道場左之右之盡是光嚴住處三萬菩薩各運無功之行二千魔女堪傳無盡之燈上至於難勝如來下至於最下乞者果能分別不生是無等等故般若云一切智智清淨無二無二分無別無斷故諸昆仲要會維摩意麼都是菩提無有不是之者要會博山意麼都不是菩提無有是之者個中有伶俐衲子將是非二字拈向一邊從這裡會去彌勒品上堂不來相而來不見相而見城東母指皆佛面來已更不來見已更不見萬別千差成一片欲知萬法皆空大似浮雲閃電智者了無分別愚徒強析名言欲求正智當於六十二見中求幾片白雲橫谷口欲求解脫當於眾生心行中求一輪明月印波心野狐向金毛隊裡翻身金毛向野狐窟中踞地如斯會去則一切眾魔及諸外道皆吾侍也眾魔樂生死生死亦不惡菩薩於生死而不捨把將生死來外道者樂諸見還見諸見起處麼菩薩於諸見而不動太跛挈生雖是拈空塞空正好以楔出楔吸盡去也三界何安倒跨泥牛縱之無所縱之無所則攀緣何生攀緣不生拔其病本到此則純鋼打就生鐵鑄成有時在泰山頂上安身有時在大洋海底立命若夫菩薩以愛見心貪著禪味等諸法是名無慧方便縛如時作麼生待風清月白時共汝商量若菩薩無愛見心不貪著禪味等諸法是名有慧方便解順時作麼生待雷轟電掣時共汝商量解縛雖殊至體不二一根既返六用互施諸昆仲此是涅槃心如何是菩薩行如博山晝起暗眠五鼓燒香清晨禮佛天明早粥日中午齋乃至迎賓待客胡言漢語瞬目揚眉且道還與佛法相應也無喚作菩薩行即不可珍重文殊品上堂諸昆仲盡大地是黑漆漆地汝向什麼處開眼盡大地如個猛火聚汝向什麼處藏身盡大地如一釜洋銅汁汝向什麼處開口盡大地是個銕刺林汝向什麼處下足古所謂三界無法何處求心四大本空佛依何住經云夫求法者不著佛求不著法求不著眾求乃至若求法者於一切法應無所求然則盡大地光皎皎地無你開眼處無你藏身處無你開口處無你下足處四大五陰向甚麼處安著山河大地從什麼處得來然此則孤迥迥峭巍巍淨裸裸沒可把盡大地無針鋒許空缺處釋迦老人亦無開口處神通妙用總用不著又何勞斷取妙喜世界借座燈王如來斂沙界於毫端擲大千於方外納須彌於芥子藏劫火於腹中延七日為永年促長年為頃刻大似聚沙作塔等同兒戲衲僧分上總用不著且道衲僧有什麼長處自從劫外花敷後直至如今笑未休不思議品上堂諸佛是幻眾生是幻菩薩亦幻幻出無根幻復成幻幻佛既知幻我我幻何如佛幻一切幻菩薩於此幻世界以斯幻法覺悟幻生於此幻化中行真實慈也於真實慈中成就無邊幻善何無緣體上度脫無量幻生拶碎玉琉璃虛己實他是務揭開真寶藏賑貧濟乏為佳善不善若浮雲碧海珊瑚孕秀身受身如旅泊瑤池蓮萼披芳欲貪從虛妄而生鐵牛舐犢三春雨分別從顛倒而有木馬嘶風一夜雲諸昆仲當知幻法無依真心無住無住無依是大火聚石火電光無著眼覷取之是迷捨之非悟關阱險危鴉飛不度如馬之馵如虎之缺指花夢花見柱非柱輔之順之五五廿五於是文殊師利菩薩以無住本立一切法大似無風起浪平地生波簡點將來好與痛棒何以故為渠秪會遮惡不知護善復笑云也是為他閑事長無明觀眾生品上堂虛而靈寂而妙纔思惟行不到堪笑缺齒老趙州將丈六金身拈來當莖草一莖草是個維摩丈室天女從甚麼處得來一莖草是個天女身形維摩丈室安在什麼處只饒天花不著也被渠當面熱瞞此花不如法是以去之眼裏著沙不得耳裏著水不得勿謂此花不如法所以者何是花無分別仁者自生分別想耳淨白人前不得說夢天止此室其已久如燈籠同年露柱同壽吾止此室如耆年解脫淨白人前不得說夢汝於三乘當何志求前不遘村後不迭店如入簷蔔林惟嗅薝蔔不嗅餘香淨白人前不得說夢汝何以不轉女身舍利弗莫是男子麼我十二年來求女人相了不可得當何所轉淨白人前不得說夢汝於此沒當生何所鑊湯爐炭劍樹刀山佛化所生吾於彼生淨白人前不得說夢汝其久如得阿耨多羅三藐三菩提七佛以前安名立字汝舍利弗還為凡夫時我乃得阿耨多羅三藐三菩提淨白人前不得說夢我為凡夫時無有是處舍利弗即今豈是聖人耶我得阿耨多羅三藐三菩提亦無是處淨白人前不得說夢諸昆仲寒則普天寒熱則普天熱甜瓜徹蒂甜苦瓠連根苦雲從龍風從虎聖人作萬物睹維摩會上一個個聖智睿聰何似博山座前聾者聾兮瞽者瞽天女身品上堂如何是佛七凹八凸如何是道冰霜雪雹要知佛道幽玄這裏看來恰好通達佛道行於非道擊水驚魚穿林驚鳥行於非道通達佛道以緇混素呼白為皂謾將惡水驀頭澆昨日嬰兒今已老行五無間罪而徹底冰清入三惡道而澄潭落影徹底冰清骨格繇來故舊澄潭落影風流不出當家示行三毒而成就慧心九轉金丹堪點銕示行六度而豁開智眼幾番落葉不知秋徹妙義於諸經架橋梁於六趣破魔外之計執成權小之智悲可謂寶手功德取之不竭用之不盡者也乃至投明珠於濁水擲至寶於淤泥興正路於邪途現涅槃於生死譬夫一水成湯鹹之淡之酸之辣之甜之苦之且道喚什麼作水也喚什麼作湯也經云如是行於非道是為通達佛道有人於這裡簡點得出博山將袈裟覆之珍重佛道品上堂蜂房有蜜粳米有粥無明是慧煩惱即佛月月月從東海昇日日日向西山沒大丈夫兒誰不知有虛空坐斷成窠臼無為大浸任彌天殖種於空終不就經云有身是如來種真箇是蝦跳不出斗無明有愛是如來種好兒終不揚家醜貪恚癡是如來種一切佛法從斯有四倒五蓋六入七識處是如來種人人鼻孔向下垂那個眉毛不解皺乃至十不善道六十二見一切煩惱皆是佛種榼𢶍堆頭無價珠一顆圓明非淨垢諸昆仲若向這裡會去正是借路還家就身打劫無量寶聚當下知歸若這裏不會直饒坐斷虛空清光炤眼不通凡聖正是迷家於衲僧分上了無交涉是以曼殊大士善用返魂之藥仍續斷途之橋捩轉鼻頭掀翻唇齒布菡萏於淤泥殖菩提於糞壤指生死海內有無價寶珠諸昆仲我等即今在生死海內頭出頭沒且道無價寶珠在什麼處膿血團中赤骨歷精光直射斗牛墟如來種品上堂大道之源混沌之先騰今耀古徹地通天斫卻中心樹子看來秪得一玄諸昆仲若論此事要識得親生父母若識得親生父母莫道參學事畢更要知毘盧有師法身有主經云智度菩薩母方便以為父此是化儀父母非親生父母也又云一切眾導師無不從彼生此是化儀導師非毘盧師也法喜以為妻慈悲心為女善心誠實男維摩眷屬一棚傀儡不假線索各人衲衣下簡點看還有許多般麼又當知空寂含覆是房舍也塵勞旋坌是弟子也親益成已是知識也四攝誘引是妓女也歌誦法言是樂音也總持廣納是園苑也密固扶疏是樹林也開合適時是妙花也知解造實是慧果也去熱除垢是浴池也三昧澄清是定水也其間更有一事聱訛不可不辯經云布以七淨花浴此無垢人若識得無垢人便識得親生父母若知親生父母便知毘盧有師法身有主諸上座要知法身主麼無手童兒能指出分明貌醜不堪傳維摩眷屬品上堂南泉大師云我十八上便解作活計趙州大師云我十八上便解破家蕩產南泉父子至親骨肉因甚麼造詣不同若向這裡會去豈但徹見南泉父子亦乃入得維摩不二法門博山當時於趙州破家蕩產處便會得南泉作活計於南泉作活計處便會得破家蕩產此二語雖如冰炭唯親履實踐者乃能知之諸昆仲此事不從學問得不從思惟得不從脩證得不從辨慧得只如維摩大士牙如劍樹口似血盆問若雲興辨如瓶瀉到這裏亦開口不得只得無言可對無理可伸可謂理屈辭窮非但要默然不得不默也古德頌云維摩不默不良久據坐商量成過咎總是瞌睡漢說他作麼文殊大士略較些子向這裏按下雲頭睜開碧眼雖然如是秪知掃葉不覺瑕生獨三十二菩薩一個個攢花織錦向無煙火處鬥弄春鶯於沒蹤跡處開展門戶非但有益於當時正為有益於現今亦有益於將來也假如有一僧向博山道和尚莫錯從古洎今未嘗有人如是批判博山秪向他道博山錯何似上座錯豈不見不因夜來雁爭見海門秋不二門品上堂饑來喫飯困來打眠咬著牙齒震動大千俊鷹不打籬下雀好兒終不用爺錢舍利弗纔欲得食早已被呵我等一日三餐如何理會廬陵米價要且不知閻羅老子打筭飯錢作麼生折合到這裏智慧辨才神通妙用總用不著只饒維摩大士遣化人至四十二億恒河沙世界上眾香世界乞香積世尊所食之餘復至娑婆世界施作佛事衲僧分上簡點將來正是鬼神活計當得什麼事諸昆仲若知十方國土猶如虛空眾香世界不離跬步一念清淨釋迦佛即是香積佛娑婆世界即是眾香世界若一念非清淨香積佛即是釋迦佛眾香世界即是娑婆世界諸昆仲若向這裏信便信去若不信從教立在古屏畔待使丹青入畫圖香積品上堂寂然不動感而遂通釋迦老人有耳如聾胡地冬抽香筍楚天雁入回峰擊碎晴空一色揭開雲霧千重此是衲僧分上具足底神通妙用又何勞化寶座將丈室置右掌然後為神異哉亦是維摩大士佛事門頭瞥爾如是非實事也眾香世界以香飯入律行娑婆世界以文字語言而入律行此悉是菩薩導機動善應權化物亦非實事也或有國土以佛光明而作佛事有以佛所化人而作佛事有以菩提樹而作佛事乃至有以佛威儀進止諸所施為而作佛事然古今非一世變時遷在博山分上總用不著博山但將現成底現前底指示大眾有時以森羅萬象而作佛事有時以日月星辰而作佛事有時以園林浴池而作佛事有時以水流風動而作佛事有時以揚眉瞬目而作佛事有時以搬柴運水而作佛事乃至與諸上座耍笑謳歌而作佛事諸昆仲且道與釋迦老人維摩大士是同耶別耶復笑云日月有明晦聖凡無二心菩薩行品上堂道遠乎哉觸事而真聖遠乎哉體之則靈見聞覺知是載道之器道不即見聞覺知亦不離見聞覺知動靜起止是聖所行處聖不即動靜起止亦不離動靜起止若得大轉變方有語話分諸昆仲若以見為見有見有不見以無見為無見此即成斷見若欲具正見無見無不見若以動為動妄心彌更動以無動為無動此人非佛種若欲知不動動上有不動會得此意縱萬境紛紜之際而恬然寂然所以肇公云江河兢注而不流野馬飄鼓而不動日月麗天而不週教中謂東方妙喜世界有佛世尊名曰不動東方乃群動之本佛名不動亦此意也而以妙喜世界入娑婆世界事有往還之跡理無往還之功如有一人從東方來東方虛空無有空缺處復至西方去而西方虛空無有逼塞處如斷妙喜世界至娑婆世界妙喜世界無空缺處娑婆世界亦無逼塞處非神通力也法如是故若會得此意是名真法供養如來諸供養中法供養最何以故一切諸佛阿耨多羅三藐三菩提皆從此經出故法華經云假使有人登須彌頂為人宣說十二部經未足為難暫讀此經是則為難諸昆仲黑的是字白的是紙縱是圓頓教乘不出大方廣十二部經典等且道喚什麼作此經這葛藤話不了喝一喝云專為流通見阿閦佛供養品戊辰重至董巖上堂天不蓋地不載是甚麼物諸禪者也須審細千人萬人中不向一人不背一人是甚麼物諸禪者也須審細虛空包不住大地載不起是甚麼物諸禪者也須審細蚊蟲眉睫上安身蟭螟腹中敷坐是甚麼物諸禪者也須審細於此四種上會去許諸人升博山堂未曾入博山室更須知博山室中受用始得諸昆仲頓明佛心毫無差互世間心念不見纖毫始名出世間人逢世間逆順境緣賢愚好歹如以手觸空了無交涉所以達磨大師云亦不睹惡而生嫌亦不觀善而勤措亦不捨愚而近賢亦不拋迷而就悟達大道兮過量通佛心兮出度不與凡聖同纏超然名之曰祖卓拄杖云達磨大師來也為汝等敷宣第一義諦且道是何章句層巖磊落從教日炙風吹行樹清涼好看花飛蝶舞上堂佛不求佛心不覓心設有求覓者皆昧心取境耳若達境唯心不生分別想山河無影跡大地絕形蹤青松與綠竹同科白鷺共黃鸝一色理無異狀緣幻千途果然徹究根源頓絕凡情聖解古德云若人識得心大地無寸土當知此一字法門豈但奪盡世間法假饒千佛出興於世行苦行坐道場說法利生般大涅槃秪是緣生法以智眼觀之如夢如幻攝大乘論云即諸三摩地大師說唯心繇心彩畫故如所作事業若達本忘情自然無惑諸昆仲此是教家極則更須知祖師門下長處始得且道作麼生是祖師門下長處拈拄杖云昨日是重陽今朝又過一日也卓拄杖下座上堂如何是道平常心是道是聖是凡都一掃纔生擬議隔天涯大似尋空向壁討諸昆仲能繇境有境逐能成境繇能境能繇境能拄杖子喚作能三十棒趁出院喚作境三十棒趁出院喚作非能非境三十棒趁出院喚作亦能亦境三十棒趁出院三祖大師無風起浪平地生波簡點將來不無滲漏雖然如是下文幸有捄言豈不見六塵不惡還同正覺智者無為愚人自縛據此亦有過犯何以故說個同字好與三十棒趁出院卓拄杖云不是與人難共住大都緇素要分明寶方上堂第一義作麼生觀佛法二字不可黏著黏著則埋沒慧命入荒田不揀草猶較些子博山當日在佛法中頭出頭沒蒙先師親垂隻手提挈在淨白地上仍被淨白為礙不免將腳跟下一片地拋向他方不可說不可說世界之外然後向太虛空翻觔斗孤標獨立始得些子實用今日與諸昆仲相見譬如白日攫金諸人歷歷見博山博山總不見諸人還信得及麼諸昆仲若見明此事須在高高山頂立深深海底行撞破虛空始能捕空捉影也博山記得親先師猶驪龍頷下探珠猛虎喉中奪雀今日不免貴買賤賣去也諸昆仲還有估價底也無良久云也不可當面錯過
